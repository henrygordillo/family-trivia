<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Family Trivia — Big Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --night:#08090f; --card:#f7f2e8; --card2:#ede7d5; --card3:#e2dbc7;
  --gold:#d4a843; --gold-hi:#f0c855; --gold-lo:#a07828;
  --teal:#1fada0; --teal-hi:#3dd5c8; --red:#c0392b; --green:#1a7a45;
  --purple:#7c3aed; --purple-hi:#a78bfa; --ink:#14120e; --muted:#6b6560;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:radial-gradient(ellipse at 50% 0%, #1a1636 0%, var(--night) 70%);
  color:#fff; font-family:'Outfit',system-ui,sans-serif;
  min-height:100vh; overflow:hidden;
  /* TVs overscan: keep everything inside a safe margin */
  padding:2.5vh 3vw;
}

/* ── Join screen ─────────────────────────────────────────── */
#join{display:flex;flex-direction:column;align-items:center;justify-content:center;height:95vh;text-align:center;}
#join h1{font-family:'Playfair Display',serif;font-size:5.5vw;font-weight:900;color:var(--gold-hi);line-height:1;margin-bottom:1vh;}
#join .sub{font-size:1.5vw;color:rgba(255,255,255,.55);letter-spacing:.25vw;text-transform:uppercase;margin-bottom:6vh;}
.codebox{background:rgba(255,255,255,.05);border:2px solid rgba(212,168,67,.4);border-radius:2vw;padding:3vh 5vw;display:flex;align-items:center;gap:4vw;}
.codelabel{font-size:1.3vw;color:rgba(255,255,255,.5);letter-spacing:.2vw;text-transform:uppercase;margin-bottom:1vh;}
.code{font-family:'Playfair Display',serif;font-size:9vw;font-weight:900;color:var(--gold-hi);letter-spacing:1vw;line-height:1;}
#qr{background:#fff;padding:1.2vw;border-radius:1vw;}
#qr img{display:block;width:14vw;height:14vw;}
#join .hint{margin-top:6vh;font-size:1.5vw;color:rgba(255,255,255,.45);}
#join .hint b{color:var(--gold);}
.dot{display:inline-block;width:.9vw;height:.9vw;border-radius:50%;background:var(--teal-hi);margin-right:.6vw;animation:pulse 1.6s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.25;}50%{opacity:1;}}

/* ── CONNECTED ────────────────────────────────────────────────────────────
   A recoloured dot is invisible from a sofa. When the judge's device pairs,
   the whole screen changes character: the code recedes (it's done its job) and
   a large green confirmation takes over. */
#join.connected .codebox{opacity:.3;transform:scale(.82);border-color:rgba(255,255,255,.12);}
#join.connected #qr{filter:grayscale(1);}
.codebox{transition:opacity .5s, transform .5s, border-color .5s;}

#connected{display:none;margin-top:5vh;align-items:center;gap:1.6vw;
  background:rgba(26,122,69,.18);border:3px solid #2ecc71;border-radius:1.4vw;
  padding:2.4vh 3.5vw;animation:landed .55s cubic-bezier(.2,.9,.3,1.3);}
#join.connected #connected{display:flex;}
#join.connected .hint{display:none;}
@keyframes landed{0%{transform:scale(.85);opacity:0;}60%{transform:scale(1.04);}100%{transform:scale(1);opacity:1;}}

.tick{width:4.5vw;height:4.5vw;border-radius:50%;background:#2ecc71;color:#06240f;
  display:flex;align-items:center;justify-content:center;font-size:2.8vw;font-weight:900;
  flex:0 0 auto;animation:beat 2.2s ease-in-out infinite;}
@keyframes beat{0%,100%{box-shadow:0 0 0 0 rgba(46,204,113,.55);}
                50%{box-shadow:0 0 0 1.6vw rgba(46,204,113,0);}}
#connected .txt{text-align:left;}
#connected .big{font-size:2.4vw;font-weight:800;color:#8ef0b4;line-height:1.15;}
#connected .dev{font-size:1.4vw;color:rgba(255,255,255,.65);margin-top:.4vh;}
#connected .go{font-size:1.2vw;color:rgba(255,255,255,.45);margin-top:.8vh;letter-spacing:.1vw;text-transform:uppercase;}

/* ── Game screen ─────────────────────────────────────────── */
#game{display:none;height:95vh;flex-direction:column;}
.scores{display:flex;gap:1.2vw;margin-bottom:1.6vh;}
.pcard{flex:1;min-width:0;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:1vw;padding:1vh .8vw;text-align:center;transition:all .25s;}
.pcard.active{background:rgba(212,168,67,.16);border-color:var(--gold);transform:translateY(-.4vh);}
.pcard.steal{background:rgba(124,58,237,.16);border-color:var(--purple-hi);}
.pcard.ondeck{border-color:rgba(255,255,255,.22);}
.pname{font-size:1.4vw;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pnum{color:rgba(255,255,255,.25);font-weight:700;margin-right:.35vw;}
.pscore{font-family:'Playfair Display',serif;font-size:2.6vw;font-weight:900;color:var(--gold-hi);line-height:1.15;}
/* Hit rate + whether they've picked this round — the phone shows both, so the TV must too */
.pmeta{display:flex;align-items:center;justify-content:center;gap:.8vw;
  font-size:.95vw;font-weight:600;color:rgba(255,255,255,.42);height:1.5vw;}
.pmeta .picked{font-weight:800;}
.pmeta .picked.no{color:var(--gold);}
.pstat{font-size:.95vw;font-weight:700;letter-spacing:.1vw;text-transform:uppercase;height:1.5vw;
  color:transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pcard.active .pstat{color:var(--gold-hi);}
.pcard.steal  .pstat{color:var(--purple-hi);}
.pcard.ondeck .pstat{color:rgba(255,255,255,.45);}
.pstat.ready{color:var(--purple-hi)!important;}

/* Board */
#board{flex:1;display:grid;gap:.7vw;min-height:0;}
.cat{background:rgba(255,255,255,.05);border:1px solid rgba(212,168,67,.35);border-radius:.7vw;
  display:flex;align-items:center;justify-content:center;text-align:center;padding:.5vh .4vw;
  font-family:'Playfair Display',serif;font-weight:700;color:var(--gold-hi);
  font-size:1.4vw;line-height:1.15;text-transform:uppercase;}
.tile{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:.7vw;
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-weight:900;font-size:2.6vw;color:var(--gold);}
.tile.used{opacity:.13;}
.tile.blocked{background:rgba(124,58,237,.12);border:1px dashed rgba(167,139,250,.5);
  flex-direction:column;gap:.3vh;color:#b9a4f5;}
.tile.blocked .star{font-size:2vw;line-height:1;}
.tile.blocked .sc{font-size:.75vw;font-weight:700;letter-spacing:.05vw;text-transform:uppercase;opacity:.75;}

/* Question — occupies the board's slot. Scores stay visible above it. */
#qscreen{display:none;flex:1;min-height:0;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:2vh 6vw;border-radius:1.2vw;
  background:radial-gradient(ellipse at 50% 30%, rgba(60,48,130,.55) 0%, rgba(8,9,15,.2) 75%);}
#qcat{font-size:1.4vw;letter-spacing:.35vw;text-transform:uppercase;color:var(--gold);}
#qpts{font-family:'Playfair Display',serif;font-size:3.6vw;font-weight:900;color:var(--gold-hi);line-height:1.1;margin-bottom:2.5vh;}
#qtext{font-family:'Playfair Display',serif;font-size:3.2vw;font-weight:700;line-height:1.3;max-width:82vw;}
#qwho{margin-top:3vh;font-size:1.7vw;color:rgba(255,255,255,.6);}
#qwho b{color:var(--gold-hi);}
#qans{margin-top:2.5vh;display:none;}
#qans .lbl{display:block;font-size:1vw;letter-spacing:.25vw;text-transform:uppercase;color:rgba(255,255,255,.45);font-weight:600;margin-bottom:.6vh;}
#qanstext{font-size:2.6vw;font-weight:800;color:var(--teal-hi);line-height:1.2;}
#qexp{margin-top:1.4vh;font-size:1.25vw;line-height:1.5;color:rgba(255,255,255,.6);max-width:62vw;
  margin-left:auto;margin-right:auto;display:none;font-weight:500;}

/* Countdown — the phone starts it, the TV runs its own so it animates smoothly
   instead of us pushing 30 updates a question. */
#timer{position:absolute;top:2.5vh;left:3vw;display:none;align-items:center;gap:1vw;z-index:15;}
#timerRing{transform:rotate(-90deg);}
#timerTrack{fill:none;stroke:rgba(255,255,255,.14);stroke-width:6;}
#timerBar{fill:none;stroke:var(--gold);stroke-width:6;stroke-linecap:round;
  transition:stroke-dashoffset 1s linear, stroke .4s;}
#timerBar.urgent{stroke:var(--red);}
#timerNum{position:absolute;left:0;width:6vw;text-align:center;
  font-family:'Playfair Display',serif;font-size:2.2vw;font-weight:900;color:var(--gold-hi);
  line-height:6vw;pointer-events:none;}
#timerNum.urgent{color:#ff8b7d;animation:tick .5s ease-in-out infinite;}
@keyframes tick{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}
#timerLbl{font-size:1vw;letter-spacing:.2vw;text-transform:uppercase;color:rgba(255,255,255,.45);font-weight:700;}

/* THE RESULT BEAT — a miss has to be impossible to miss. */
#result{display:none;margin-top:2.5vh;padding:1.6vh 3vw;border-radius:1vw;
  font-size:2.2vw;font-weight:800;letter-spacing:.05vw;animation:pop .35s ease-out;}
#result.right{background:rgba(26,122,69,.25);border:2px solid #2ecc71;color:#7be8a5;}
#result.wrong{background:rgba(192,57,43,.22);border:2px solid var(--red);color:#ff8b7d;}
#result.stealing{background:rgba(124,58,237,.22);border:2px solid var(--purple-hi);color:#c9b6ff;}
#result .sub{display:block;font-size:1.3vw;font-weight:600;opacity:.85;margin-top:.6vh;}
@keyframes pop{0%{transform:scale(.9);opacity:0;}60%{transform:scale(1.03);}100%{transform:scale(1);opacity:1;}}

/* Flash the whole screen so a change is noticed from across the room */
.flash-right{animation:fr .7s ease-out;}
.flash-wrong{animation:fw .7s ease-out;}
@keyframes fr{0%{box-shadow:inset 0 0 0 0 rgba(46,204,113,0);}25%{box-shadow:inset 0 0 22vh 0 rgba(46,204,113,.28);}100%{box-shadow:inset 0 0 0 0 rgba(46,204,113,0);}}
@keyframes fw{0%{box-shadow:inset 0 0 0 0 rgba(192,57,43,0);}25%{box-shadow:inset 0 0 22vh 0 rgba(192,57,43,.32);}100%{box-shadow:inset 0 0 0 0 rgba(192,57,43,0);}}

/* Question is being written — tell the room what's happening, don't just sit there */
#gen{display:none;flex:1;min-height:0;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
#gen .who{font-size:2.6vw;font-weight:700;line-height:1.3;}
#gen .who b{color:var(--gold-hi);}
#gen .status{margin-top:3vh;font-size:1.4vw;color:rgba(255,255,255,.45);letter-spacing:.15vw;text-transform:uppercase;}
.spinner{width:4vw;height:4vw;margin:0 auto 3vh;border:.35vw solid rgba(212,168,67,.2);
  border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Audio is blocked until someone interacts with the page — and nobody touches a TV.
   One press of the remote unlocks it for the session. */
#audioLock{position:fixed;bottom:3vh;left:50%;transform:translateX(-50%);z-index:30;
  background:rgba(212,168,67,.92);color:#14120e;font-weight:800;font-size:1.1vw;
  padding:1.2vh 2.5vw;border-radius:2vw;border:none;cursor:pointer;display:none;
  animation:pulse 2s ease-in-out infinite;}

.offline{position:fixed;bottom:2.5vh;left:0;right:0;text-align:center;font-size:1vw;color:var(--red);display:none;}
/* Top-right, inside the safe area — the bottom edge of a TV is often cropped. */
.tag{position:fixed;top:2.5vh;right:3vw;font-size:.8vw;color:rgba(255,255,255,.3);
  background:rgba(0,0,0,.35);padding:.5vh 1vw;border-radius:.5vw;letter-spacing:.03vw;z-index:20;}
</style>
</head>
<body>

<div id="join">
  <h1>Family Trivia</h1>
  <div class="sub">Big Screen</div>
  <div class="codebox">
    <div>
      <div class="codelabel">Join code</div>
      <div class="code" id="code">····</div>
    </div>
    <div id="qr"></div>
  </div>
  <div class="hint" id="hint"><span class="dot"></span>On your phone, tap <b>Connect to TV</b> — enter this code, or scan the QR code</div>

  <div id="connected">
    <div class="tick">✓</div>
    <div class="txt">
      <div class="big">Judge device connected</div>
      <div class="dev" id="devName"></div>
      <div class="go">Start the game on that device</div>
    </div>
  </div>
</div>

<div id="game" style="position:relative;">
  <div id="timer">
    <div style="position:relative;">
      <svg id="timerRing" width="6vw" height="6vw" viewBox="0 0 72 72" style="width:6vw;height:6vw;">
        <circle id="timerTrack" cx="36" cy="36" r="30"/>
        <circle id="timerBar" cx="36" cy="36" r="30"/>
      </svg>
      <div id="timerNum">30</div>
    </div>
    <div id="timerLbl"></div>
  </div>
  <div class="scores" id="scores"></div>
  <div id="board"></div>
  <div id="gen">
    <div class="spinner"></div>
    <div class="who" id="genWho"></div>
    <div class="status">Writing the question…</div>
  </div>
  <div id="qscreen">
    <div id="qcat"></div>
    <div id="qpts"></div>
    <div id="qtext"></div>
    <div id="qwho"></div>
    <div id="qans">
      <span class="lbl">Answer</span>
      <div id="qanstext"></div>
      <div id="qexp"></div>
    </div>
    <div id="result"></div>
  </div>
</div>

<button id="audioLock">🔊  Press OK to let the TV read questions aloud</button>
<div class="offline" id="offline">Lost connection to the game — reload this page</div>
<div class="tag" id="tag"></div>

<script>
const TV_VERSION='3.9';
const TV_BUILT_AT='2026-07-13T23:20:57Z';
const BACKEND='';   // same origin

const PTS=[100,200,300,400,500];
let CODE=null, ES=null;

function fmt(iso){
  try{
    const d=new Date(iso); if(isNaN(d)) return '';
    const p={};
    new Intl.DateTimeFormat('en-CA',{year:'numeric',month:'2-digit',day:'2-digit',
      hour:'2-digit',minute:'2-digit',hour12:true}).formatToParts(d).forEach(x=>p[x.type]=x.value);
    const ap=(p.dayPeriod||'').replace(/\./g,'').toUpperCase();
    return `${p.year}-${p.month}-${p.day} ${p.hour}:${p.minute} ${ap}`;
  }catch(e){ return ''; }
}
// All three builds on one line, so a file that didn't get pushed is obvious.
let _appVer = null;
let SRV_VER = '…';
function paintTags(){
  document.getElementById('tag').textContent =
    `TV ${TV_VERSION}  ·  App ${_appVer || '—'}  ·  Server ${SRV_VER}`;
}
paintTags();
fetch(BACKEND+'/api/version').then(r=>r.json()).then(d=>{
  SRV_VER = d.version;
  paintTags();
}).catch(()=>{ SRV_VER='unreachable'; paintTags(); });

// ── Get a room, show the code + QR ────────────────────────────────────────
async function init(){
  try{
    const r = await fetch(BACKEND+'/api/room/new', {method:'POST'});
    const d = await r.json();
    CODE = d.code;
  }catch(e){
    document.getElementById('code').textContent='···';
    document.getElementById('offline').style.display='block';
    document.getElementById('offline').textContent='Could not reach the server — reload this page';
    return;
  }
  document.getElementById('code').textContent = CODE;

  // QR points the phone straight at the app with the code prefilled.
  const joinUrl = location.origin + '/?tv=' + CODE;
  const qr = document.getElementById('qr');
  const img = document.createElement('img');
  img.alt = 'Scan to connect';
  img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=0&data=' + encodeURIComponent(joinUrl);
  img.onerror = () => { qr.style.display='none'; };   // no internet for the QR service? code still works
  qr.appendChild(img);

  listen();
}

// ── Paired / not paired ───────────────────────────────────────────────────
let _paired=false, _device='';
function setPaired(on, device){
  const dev = device || _device;
  if(on===_paired && dev===_device) return;
  _paired=on; _device=dev;
  // The whole join screen changes state — the code fades back, a big green
  // confirmation comes forward. Readable from the sofa, unlike a coloured dot.
  document.getElementById('join').classList.toggle('connected', on);
  document.getElementById('devName').textContent = dev || '';
}

// ── Subscribe to the room's push stream ───────────────────────────────────
function listen(){
  ES = new EventSource(BACKEND+'/api/room/'+CODE+'/stream');
  ES.addEventListener('state',   e => render(JSON.parse(e.data)));
  ES.addEventListener('waiting', () => { setPaired(false, ''); });   // no phone yet
  ES.addEventListener('closed',  () => { location.reload(); });  // phone left — fresh code
  ES.onerror = () => { document.getElementById('offline').style.display='block'; };
  ES.onopen  = () => { document.getElementById('offline').style.display='none'; };
}

// ── Render the snapshot ───────────────────────────────────────────────────
let _lastResultKey = null;      // so we only flash once per verdict

// ── Countdown ─────────────────────────────────────────────────────────────
// The phone tells us ONCE that a timer started (id, total, seconds left). We run
// the tick locally so the ring animates smoothly, instead of the phone pushing
// 30 network updates per question.
// ── Speech ────────────────────────────────────────────────────────────────
// The phone asks; the TV speaks. Browsers refuse to make sound until the page has
// been interacted with — and nobody ever touches a TV — so we show a one-time
// "press OK" nudge to unlock audio for the session.
let _audioReady = false, _lastSpeakSeq = 0, _pendingSpeak = null;

function unlockAudio(){
  _audioReady = true;
  document.getElementById('audioLock').style.display='none';
  try{
    // A silent utterance is what actually unlocks the speech engine.
    const u=new SpeechSynthesisUtterance(' ');
    u.volume=0; window.speechSynthesis.speak(u);
  }catch(e){}
  if(_pendingSpeak){ const t=_pendingSpeak; _pendingSpeak=null; sayIt(t); }
}
document.getElementById('audioLock').addEventListener('click', unlockAudio);
// Any remote press works — a TV remote's OK usually lands as a keydown.
window.addEventListener('keydown', ()=>{ if(!_audioReady) unlockAudio(); });

function sayIt(text){
  if(!('speechSynthesis' in window)) return;
  try{
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.rate=0.9; u.pitch=1.05;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

function handleSpeak(sp){
  if(!sp || !sp.text) return;
  if(sp.seq === _lastSpeakSeq) return;         // already said this one
  _lastSpeakSeq = sp.seq;
  if(!('speechSynthesis' in window)) return;   // TV can't talk — phone will have to
  if(!_audioReady){
    _pendingSpeak = sp.text;
    document.getElementById('audioLock').style.display='block';
    return;
  }
  sayIt(sp.text);
}

const CIRC = 2 * Math.PI * 30;
let _timerId=null, _timerInt=null;

function stopTimer(){
  if(_timerInt){ clearInterval(_timerInt); _timerInt=null; }
  _timerId=null;
  document.getElementById('timer').style.display='none';
}

function runTimer(t){
  if(!t){ stopTimer(); return; }
  if(t.id === _timerId) return;          // already running this one
  if(_timerInt) clearInterval(_timerInt);
  _timerId = t.id;

  const wrap=document.getElementById('timer');
  const bar=document.getElementById('timerBar');
  const num=document.getElementById('timerNum');
  document.getElementById('timerLbl').textContent = t.label || '';
  bar.style.strokeDasharray = CIRC;
  wrap.style.display='flex';

  let remaining = t.remaining;
  const total = t.total || 30;

  const paint=()=>{
    num.textContent = remaining<0 ? 0 : remaining;
    const pct = Math.max(0, remaining/total);
    bar.style.strokeDashoffset = CIRC * (1-pct);
    const urgent = pct <= 0.33;
    bar.classList.toggle('urgent', urgent);
    num.classList.toggle('urgent', urgent);
  };
  paint();

  _timerInt=setInterval(()=>{
    remaining--;
    paint();
    if(remaining<=0){ clearInterval(_timerInt); _timerInt=null; }
  },1000);
}

// Mirrors the phone's findStealIdx(): the next player in turn order who hasn't
// already been wrong on this question.
function nextEligible(S, fromIdx){
  const order=S.turnOrder||[];
  const n=order.length;
  const pos=order.indexOf(fromIdx);
  for(let i=1;i<=n;i++){
    const idx=order[(pos+i)%n];
    if(S.judgeMode==='human' && idx===S.hjJudgeIdx) continue;
    if((S.wrongPlayers||[]).includes(idx)) continue;
    return idx;
  }
  return -1;
}

function render(S){
  if(!S) return;

  // A phone has pushed something — so we're paired, whatever it says.
  setPaired(true, S.device);
  if(S.appVersion && S.appVersion !== _appVer){ _appVer = S.appVersion; paintTags(); }

  // NO GAME RUNNING → go back to the join screen. Without this the TV kept
  // rendering the LAST game's board after the phone backed out to setup.
  if(!S.active || !S.players || !S.players.length){
    document.getElementById('join').style.display='flex';
    document.getElementById('game').style.display='none';
    _lastResultKey=null;
    return;
  }

  document.getElementById('join').style.display='none';
  document.getElementById('game').style.display='flex';

  handleSpeak(S.speak);

  const q = S.currentQuestion;
  const questionOpen = !!(q && q.text);
  const generating = !!S.generating;

  // ── Scores — mirrors the phone's scoreboard exactly:
  //    #, name (+crown, +streak), hit rate, score, picked-this-round, status.
  const answering = S.answererIdx!=null && questionOpen;
  const picker = S.nextPickerIdx;

  // Who's next in line? (phone: findStealIdx / on-deck)
  const stealIdx  = answering ? nextEligible(S, S.answererIdx) : -1;
  let onDeckIdx = -1;
  if(!answering){
    const pp=(S.turnOrder||[]).indexOf(picker);
    if(pp>=0){
      onDeckIdx=S.turnOrder[(pp+1)%S.turnOrder.length];
      if(onDeckIdx===picker) onDeckIdx=-1;
    }
  }

  const maxS=Math.max(...S.scores);
  const leader=(maxS>0 && S.scores.filter(x=>x===maxS).length===1) ? S.scores.indexOf(maxS) : -1;

  document.getElementById('scores').innerHTML = S.players.map((p,i)=>{
    const isAns    = answering && i===S.answererIdx;
    const isPick   = !answering && i===picker;
    const isSteal  = answering && i===stealIdx;
    const isOnDeck = !answering && i===onDeckIdx;

    let cls='pcard', stat='', statCls='pstat';
    if(isAns){        cls += S.stealMode ? ' steal' : ' active';
                      stat = S.stealMode ? 'Stealing' : 'Answering'; }
    else if(isPick){  cls += ' active';  stat = (S.phase==='reading' ? 'Reading' : 'Picking'); }
    else if(isSteal){ cls += ' steal';   stat = 'Ready to steal!'; statCls += ' ready'; }
    else if(isOnDeck){cls += ' ondeck';  stat = 'On deck'; }

    const st=(S.streak||[])[i]||0;
    const badge = st>=2 ? ` 🔥${st}` : (st<=-2 ? ` 🧊${-st}` : '');
    const crown = (i===leader) ? '👑 ' : '';

    // Hit rate this game (phone's "Hit" column) — from attempts, which carry no answers
    const mine=(S.attempts||[]).filter(a=>a.player===p);
    const ok=mine.filter(a=>a.correct).length;
    const hit = mine.length ? Math.round(ok/mine.length*100)+'%' : '—';

    // Picked this round (phone's "Picked?" column)
    const done=(S.pickedThisRound||[]).includes(i);
    const picked = done
      ? '<span class="picked">✓</span>'
      : '<span class="picked no">–</span>';

    return `<div class="${cls}">
      <div class="pname"><span class="pnum">${i+1}</span>${crown}${p}${badge}</div>
      <div class="pscore">${S.scores[i]}</div>
      <div class="pmeta"><span>${hit}</span>${picked}</div>
      <div class="${statCls}">${stat}</div>
    </div>`;
  }).join('');

  // ── Board / generating / question — exactly one at a time ──
  document.getElementById('board').style.display   = (!questionOpen && !generating) ? 'grid' : 'none';
  document.getElementById('gen').style.display     = generating ? 'flex' : 'none';
  document.getElementById('qscreen').style.display = questionOpen ? 'flex' : 'none';

  if(generating){
    const g=S.generating;
    document.getElementById('genWho').innerHTML =
      `<b>${g.player||'Someone'}</b> picked <b>${g.category||'a category'}</b>` +
      (g.pts ? ` for <b>${g.pts}</b>` : '');
    stopTimer();
    return;
  }

  if(!questionOpen){
    const board=document.getElementById('board');
    board.style.gridTemplateColumns=`repeat(${S.numCats},1fr)`;
    board.style.gridTemplateRows=`auto repeat(${S.numQ},1fr)`;
    let h='';
    (S.categories||[]).forEach(c=>{ h+=`<div class="cat">${c}</div>`; });
    for(let qi=0; qi<S.numQ; qi++){
      for(let ci=0; ci<S.numCats; ci++){
        const key=`${ci}-${qi}`;
        if((S.blocked||{})[key])   h+=`<div class="tile blocked"><span class="star">★</span><span class="sc">All-Play<br>coming soon</span></div>`;
        else if((S.used||{})[key]) h+=`<div class="tile used">✓</div>`;
        else                       h+=`<div class="tile">${PTS[qi]}</div>`;
      }
    }
    board.innerHTML=h;
    _lastResultKey=null;                       // back on the board — arm the next flash
    document.getElementById('result').style.display='none';
    stopTimer();
    return;
  }

  // ── Question ──
  document.getElementById('qcat').textContent=(S.categories||[])[S.curCat]||'';
  document.getElementById('qpts').textContent=S.curPts||'';
  document.getElementById('qtext').textContent=q.text;

  // Who's on the spot. Suppressed once the result banner is saying it louder.
  const who=S.players[S.answererIdx];
  document.getElementById('qwho').innerHTML = (who && !S.lastResult)
    ? `<b>${who}</b> is answering`
    : '';

  // The answer — and its explanation — only arrive after the judge reveals.
  const ansEl=document.getElementById('qans');
  const expEl=document.getElementById('qexp');
  if(S.revealedAnswer){
    document.getElementById('qanstext').textContent=S.revealedAnswer;
    if(S.revealedExplanation){
      expEl.textContent=S.revealedExplanation;
      expEl.style.display='block';
    } else {
      expEl.style.display='none';
    }
    ansEl.style.display='block';
  } else {
    ansEl.style.display='none';
    expEl.style.display='none';
  }

  runTimer(S.timer);

  // ── THE RESULT BEAT ──
  // Without this, a wrong answer just quietly swapped the name at the bottom and
  // nobody noticed. Now the room gets a loud, unmissable verdict.
  const res=document.getElementById('result');
  const r=S.lastResult;
  if(r){
    // TWO BEATS, in step with the judge:
    //   'steal-offer' → the judge tapped Incorrect. Announce the miss and who may steal.
    //   stealMode     → the judge tapped Ready to Steal. Now it's live.
    const offering = (S.phase==='steal-offer' && S.pendingStealIdx!=null);
    const key = `${r.player}|${r.correct}|${r.pts}|${r.steal}|${S.phase}|${S.stealMode}`;
    res.className = r.correct ? 'right' : (S.stealMode && !S.pendingStealIdx ? 'stealing' : 'wrong');
    if(r.correct){
      res.innerHTML = `✓ ${r.player} got it${r.steal?' — STOLEN!':''}`
        + `<span class="sub">+${r.pts} points</span>`;
    } else if(offering){
      const stealer = S.players[S.pendingStealIdx];
      res.innerHTML = `✗ ${r.player} missed`
        + `<span class="sub">${stealer} can steal it</span>`;
    } else if(S.stealMode){
      const stealer = S.players[S.answererIdx];
      res.innerHTML = `⚡ ${stealer} is stealing`
        + `<span class="sub">${r.player} missed \u2014 half points up for grabs</span>`;
    } else {
      res.innerHTML = `✗ ${r.player} missed`
        + `<span class="sub">Nobody stole it</span>`;
    }
    res.style.display='block';
    if(key !== _lastResultKey){
      _lastResultKey = key;
      const body=document.body;
      body.classList.remove('flash-right','flash-wrong');
      void body.offsetWidth;                        // restart the animation
      body.classList.add(r.correct ? 'flash-right' : 'flash-wrong');
      setTimeout(()=>body.classList.remove('flash-right','flash-wrong'), 800);
    }
  } else {
    res.style.display='none';
    _lastResultKey=null;
  }
}

init();
</script>
</body>
</html>
