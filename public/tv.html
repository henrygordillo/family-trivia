<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trivia Night — Shared Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --night:#08090f; --card:#f7f2e8; --card2:#ede7d5; --card3:#e2dbc7;
  --gold:#d4a843; --gold-hi:#f0c855; --gold-lo:#a07828;
  --teal:#1fada0; --teal-hi:#3dd5c8; --red:#c0392b; --green:#1a7a45;
  --purple:#7c3aed; --purple-hi:#a78bfa; --ink:#14120e; --muted:#6b6560;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:radial-gradient(ellipse at 50% 0%, #1a1636 0%, var(--night) 70%);
  color:#fff; font-family:'Outfit',system-ui,sans-serif;
  min-height:100vh; overflow:hidden;
  /* TVs overscan: keep everything inside a safe margin */
  padding:2.5vh 3vw;
}

/* ── Join screen ─────────────────────────────────────────── */
#join{display:flex;flex-direction:column;align-items:center;justify-content:center;height:95vh;text-align:center;}
#join h1{font-family:'Playfair Display',serif;font-size:clamp(23px,5.5vw,121px);font-weight:900;color:var(--gold-hi);line-height:1;margin-bottom:1vh;}
#join .sub{font-size:clamp(9px,1.5vw,33px);color:rgba(255,255,255,.55);letter-spacing:.25vw;text-transform:uppercase;margin-bottom:4vh;}
/* Say what this screen is for once, up here — so neither door below repeats it. */
#join .purpose{font-size:clamp(10px,1.9vw,42px);color:rgba(255,255,255,.8);margin-bottom:1.6vh;}
.codebox{background:rgba(255,255,255,.05);border:2px solid rgba(212,168,67,.4);border-radius:2vw;padding:3vh 5vw;display:flex;align-items:center;gap:4vw;}
.codelabel{font-size:clamp(9px,1.3vw,29px);color:rgba(255,255,255,.5);letter-spacing:.2vw;text-transform:uppercase;margin-bottom:1vh;}
.code{font-family:'Playfair Display',serif;font-size:clamp(38px,9.0vw,198px);font-weight:900;color:var(--gold-hi);letter-spacing:1vw;line-height:1;}
#qr{background:#fff;padding:1.2vw;border-radius:1vw;}
#qr img{display:block;width:14vw;height:14vw;}
#join .hint{margin-top:6vh;font-size:clamp(9px,1.5vw,33px);color:rgba(255,255,255,.45);}
#join .hint b{color:var(--gold);}
.dot{display:inline-block;width:.9vw;height:.9vw;border-radius:50%;background:var(--teal-hi);margin-right:.6vw;animation:pulse 1.6s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.25;}50%{opacity:1;}}

/* ── CONNECTED ────────────────────────────────────────────────────────────
   A recoloured dot is invisible from a sofa. When the judge's device pairs, the
   whole screen changes character: a large green confirmation takes over, and the
   code stays loud because it now belongs to the players. */
.codebox{transition:opacity .5s, transform .5s, border-color .5s;}

#connected{display:none;margin-top:5vh;align-items:center;gap:1.6vw;
  background:rgba(26,122,69,.18);border:3px solid #2ecc71;border-radius:1.4vw;
  padding:2.4vh 3.5vw;animation:landed .55s cubic-bezier(.2,.9,.3,1.3);}
#join.connected #connected{display:flex;}
#join.connected .hint{display:none;}
@keyframes landed{0%{transform:scale(.85);opacity:0;}60%{transform:scale(1.04);}100%{transform:scale(1);opacity:1;}}

.tick{width:4.5vw;height:4.5vw;border-radius:50%;background:#2ecc71;color:#06240f;
  display:flex;align-items:center;justify-content:center;font-size:clamp(12px,2.8vw,62px);font-weight:900;
  flex:0 0 auto;animation:beat 2.2s ease-in-out infinite;}
@keyframes beat{0%,100%{box-shadow:0 0 0 0 rgba(46,204,113,.55);}
                50%{box-shadow:0 0 0 1.6vw rgba(46,204,113,0);}}
#connected .txt{text-align:left;}
#connected .big{font-size:clamp(10px,2.4vw,53px);font-weight:800;color:#8ef0b4;line-height:1.15;}
#connected .dev{font-size:clamp(9px,1.4vw,31px);color:rgba(255,255,255,.65);margin-top:.4vh;}
#connected .go{font-size:clamp(9px,1.2vw,26px);color:rgba(255,255,255,.45);margin-top:.8vh;letter-spacing:.1vw;text-transform:uppercase;}

/* Late-join QR — stays on the game screen so newcomers can still hop in */
#gameJoin{display:flex;align-items:center;gap:.7vw;flex:0 0 auto;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:1vw;padding:.6vw .9vw;}
#gameJoin .qrbox{background:#fff;padding:.4vw;border-radius:.5vw;}
#gameJoin .qrbox img{display:block;width:clamp(46px,4.6vw,90px);height:clamp(46px,4.6vw,90px);}
#gameJoin .gj-txt{font-size:clamp(8px,1vw,20px);color:rgba(255,255,255,.8);line-height:1.35;text-align:left;white-space:nowrap;}
#gameJoin .gj-txt b{color:var(--gold-hi);font-size:clamp(11px,1.4vw,28px);letter-spacing:.15vw;}

/* ── Game screen ─────────────────────────────────────────── */
#game{display:none;height:95vh;flex-direction:column;}
.topband{display:flex;gap:1.2vw;align-items:stretch;margin-bottom:1.6vh;}
.scores{display:flex;gap:1.2vw;flex:1;min-width:0;}
.pcard{flex:1;min-width:0;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:1vw;padding:1vh .8vw;text-align:center;transition:all .25s;}
.pcard.active{background:rgba(212,168,67,.16);border-color:var(--gold);transform:translateY(-.4vh);}
.pcard.steal{background:rgba(124,58,237,.16);border-color:var(--purple-hi);}
.pcard.ondeck{border-color:rgba(255,255,255,.22);}
.pname{font-size:clamp(9px,1.4vw,31px);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pnum{color:rgba(255,255,255,.25);font-weight:700;margin-right:.35vw;}
.pscore{font-family:'Playfair Display',serif;font-size:clamp(11px,2.6vw,57px);font-weight:900;color:var(--gold-hi);line-height:1.15;}
/* Hit rate + whether they've picked this round — the phone shows both, so the TV must too */
.pmeta{display:flex;align-items:center;justify-content:center;gap:.5vw;flex-wrap:wrap;
  height:1.8vw;white-space:nowrap;}
.pmeta .chip{font-size:clamp(9px,0.8vw,18px);font-weight:600;color:rgba(255,255,255,.45);
  background:rgba(255,255,255,.06);border-radius:1vw;padding:.2vh .8vw;}
.pmeta .chip.owed{color:var(--gold-hi);background:rgba(212,168,67,.14);}
.pcard.missed{border-color:rgba(192,57,43,.7);background:rgba(192,57,43,.12);}
.pstat.miss{color:#ff8b7d!important;}
.pstat{font-size:clamp(9px,0.95vw,21px);font-weight:700;letter-spacing:.1vw;text-transform:uppercase;height:1.5vw;
  color:transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pcard.active .pstat{color:var(--gold-hi);}
.pcard.steal  .pstat{color:var(--purple-hi);}
.pcard.ondeck .pstat{color:rgba(255,255,255,.45);}
.pstat.ready{color:var(--purple-hi)!important;}

/* Board */
#board{flex:1;display:grid;gap:.7vw;min-height:0;}
.cat{background:rgba(255,255,255,.05);border:1px solid rgba(212,168,67,.35);border-radius:.7vw;
  display:flex;align-items:center;justify-content:center;text-align:center;padding:.5vh .4vw;
  font-family:'Playfair Display',serif;font-weight:700;color:var(--gold-hi);
  font-size:clamp(9px,1.4vw,31px);line-height:1.15;text-transform:uppercase;}
.tile{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:.7vw;
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-weight:900;font-size:clamp(11px,2.6vw,57px);color:var(--gold);}
.tile.used{opacity:.13;}
.tile.blocked{background:rgba(124,58,237,.12);border:1px dashed rgba(167,139,250,.5);
  flex-direction:column;gap:.3vh;color:#b9a4f5;}
.tile.blocked .star{font-size:clamp(9px,2.0vw,44px);line-height:1;}
.tile.blocked .sc{font-size:clamp(9px,0.75vw,16px);font-weight:700;letter-spacing:.05vw;text-transform:uppercase;opacity:.75;}

/* Question — occupies the board's slot. Scores stay visible above it. */
#qscreen{display:none;position:relative;flex:1;min-height:0;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:2vh 6vw;border-radius:1.2vw;
  background:radial-gradient(ellipse at 50% 30%, rgba(60,48,130,.55) 0%, rgba(8,9,15,.2) 75%);}
#qcat{font-size:clamp(9px,1.4vw,31px);letter-spacing:.35vw;text-transform:uppercase;color:var(--gold);}
#qpts{font-family:'Playfair Display',serif;font-size:clamp(15px,3.6vw,79px);font-weight:900;color:var(--gold-hi);line-height:1.1;}
#qtext{font-family:'Playfair Display',serif;font-size:clamp(13px,3.2vw,70px);font-weight:700;line-height:1.3;max-width:82vw;}
/* Sits with the category, points and timer — everything you need to know ABOUT
   the question, above the question itself. */
#qwho{margin-top:.6vh;font-size:clamp(9px,1.5vw,33px);color:rgba(255,255,255,.55);min-height:1.8vw;}
#qwho b{color:var(--gold-hi);}
#qans{margin-top:2.5vh;display:none;}
#qans .lbl{display:block;font-size:clamp(9px,1.0vw,22px);letter-spacing:.25vw;text-transform:uppercase;color:rgba(255,255,255,.45);font-weight:600;margin-bottom:.6vh;}
#qanstext{font-size:clamp(11px,2.6vw,57px);font-weight:800;color:var(--teal-hi);line-height:1.2;}
#qexp{margin-top:1.4vh;font-size:clamp(9px,1.25vw,28px);line-height:1.5;color:rgba(255,255,255,.6);max-width:62vw;
  margin-left:auto;margin-right:auto;display:none;font-weight:500;}

/* Countdown — the phone starts it, the TV runs its own so it animates smoothly
   instead of us pushing 30 updates a question. */
/* The timer belongs WITH the category and points, not floating in a corner. */
.qhead{display:flex;align-items:center;justify-content:center;gap:3vw;margin-bottom:3vh;}
.qhead-txt{text-align:center;}
#timer{display:none;flex-direction:column;align-items:center;gap:.4vh;}
#timerRing{transform:rotate(-90deg);}
#timerTrack{fill:none;stroke:rgba(255,255,255,.14);stroke-width:6;}
#timerBar{fill:none;stroke:var(--gold);stroke-width:6;stroke-linecap:round;
  transition:stroke-dashoffset 1s linear, stroke .4s;}
#timerBar.urgent{stroke:var(--red);}
#timerNum{position:absolute;left:0;top:0;width:5.5vw;height:5.5vw;text-align:center;
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-size:clamp(9px,2.0vw,44px);font-weight:900;color:var(--gold-hi);
  pointer-events:none;}
#timerNum.urgent{color:#ff8b7d;animation:tick .5s ease-in-out infinite;}
@keyframes tick{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}
#timerLbl{font-size:clamp(9px,0.85vw,19px);letter-spacing:.15vw;text-transform:uppercase;color:rgba(255,255,255,.45);font-weight:700;}

/* THE RESULT BEAT — a miss has to be impossible to miss. */
#result{display:none;margin-top:2.5vh;padding:1.6vh 3vw;border-radius:1vw;
  font-size:clamp(9px,2.2vw,48px);font-weight:800;letter-spacing:.05vw;animation:pop .35s ease-out;}
#result.right{background:rgba(26,122,69,.25);border:2px solid #2ecc71;color:#7be8a5;}
#result.wrong{background:rgba(192,57,43,.22);border:2px solid var(--red);color:#ff8b7d;}
#result.stealing{background:rgba(124,58,237,.22);border:2px solid var(--purple-hi);color:#c9b6ff;}
#result .sub{display:block;font-size:clamp(9px,1.3vw,29px);font-weight:600;opacity:.85;margin-top:.6vh;}
@keyframes pop{0%{transform:scale(.9);opacity:0;}60%{transform:scale(1.03);}100%{transform:scale(1);opacity:1;}}

/* Flash the whole screen so a change is noticed from across the room */
.flash-right{animation:fr .7s ease-out;}
.flash-wrong{animation:fw .7s ease-out;}
@keyframes fr{0%{box-shadow:inset 0 0 0 0 rgba(46,204,113,0);}25%{box-shadow:inset 0 0 22vh 0 rgba(46,204,113,.28);}100%{box-shadow:inset 0 0 0 0 rgba(46,204,113,0);}}
@keyframes fw{0%{box-shadow:inset 0 0 0 0 rgba(192,57,43,0);}25%{box-shadow:inset 0 0 22vh 0 rgba(192,57,43,.32);}100%{box-shadow:inset 0 0 0 0 rgba(192,57,43,0);}}

/* Question is being written — tell the room what's happening, don't just sit there */
#gen{display:none;flex:1;min-height:0;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
#gen .who{font-size:clamp(11px,2.6vw,57px);font-weight:700;line-height:1.3;}
#gen .who b{color:var(--gold-hi);}
#gen .status{margin-top:3vh;font-size:clamp(9px,1.4vw,31px);color:rgba(255,255,255,.45);letter-spacing:.15vw;text-transform:uppercase;}
.spinner{width:4vw;height:4vw;margin:0 auto 3vh;border:.35vw solid rgba(212,168,67,.2);
  border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Audio is blocked until someone interacts with the page — and nobody touches a TV.
   One press of the remote unlocks it for the session. */
#audioLock{position:fixed;bottom:3vh;left:50%;transform:translateX(-50%);z-index:30;
  background:rgba(212,168,67,.92);color:#14120e;font-weight:800;font-size:clamp(9px,1.1vw,24px);
  padding:1.2vh 2.5vw;border-radius:2vw;border:none;cursor:pointer;display:none;
  animation:pulse 2s ease-in-out infinite;}

/* End of a round — a proper panel, not a translucent strip. Same numbers the
   phone's callout shows: main vs steal, attempts, hit rate, points, total. */
#roundEnd{display:none;flex:1;min-height:0;flex-direction:column;align-items:center;
  justify-content:center;padding:2vh 4vw;animation:pop .45s cubic-bezier(.2,.9,.3,1.2);}
.rv{display:none;font-size:clamp(9px,2.2vw,48px);font-weight:800;padding:1.4vh 3vw;border-radius:1vw;
  margin-bottom:2.5vh;text-align:center;}
.rv.right{background:rgba(26,122,69,.25);border:2px solid #2ecc71;color:#7be8a5;}
.rv.wrong{background:rgba(192,57,43,.22);border:2px solid var(--red);color:#ff8b7d;}
.rv .pts{opacity:.85;}
.rv .ans{font-size:clamp(9px,1.3vw,29px);font-weight:600;color:rgba(255,255,255,.65);margin-top:.6vh;}
.rv .ans b{color:var(--teal-hi);}
#roundEnd .t{font-family:'Playfair Display',serif;font-size:clamp(12px,2.8vw,62px);font-weight:900;
  color:var(--gold-hi);line-height:1.1;margin-bottom:.4vh;}
#roundEnd .s{font-size:clamp(9px,1.5vw,33px);color:rgba(255,255,255,.6);margin-bottom:2.5vh;}
#roundEnd .s b{color:#fff;}
.rtab{border-collapse:collapse;width:82vw;max-width:82vw;}
.rtab th{font-size:clamp(9px,0.9vw,20px);font-weight:700;letter-spacing:.1vw;text-transform:uppercase;
  color:rgba(255,255,255,.4);padding:.6vh .8vw;}
.rtab thead tr:first-child th{border-bottom:1px solid rgba(255,255,255,.15);}
.rtab .grp{color:rgba(255,255,255,.55);}
.rtab .grp.main{color:var(--gold);}
.rtab .grp.steal{color:var(--purple-hi);}
.rtab td{padding:1vh .8vw;text-align:center;font-size:clamp(9px,1.4vw,31px);font-weight:600;
  color:rgba(255,255,255,.75);border-top:1px solid rgba(255,255,255,.07);}
.rtab td.nm{text-align:left;font-size:clamp(9px,1.7vw,37px);font-weight:700;color:#fff;white-space:nowrap;}
.rtab td.tot{text-align:right;font-family:'Playfair Display',serif;font-size:clamp(9px,2.2vw,48px);
  font-weight:900;color:var(--gold-hi);}
.rtab tr.lead td{background:rgba(212,168,67,.1);}
.rtab tr.lead td.nm{color:var(--gold-hi);}
.rtab .dim{color:rgba(255,255,255,.3);}
.rtab .sep{border-left:1px solid rgba(255,255,255,.12);}

.offline{position:fixed;bottom:2.5vh;left:0;right:0;text-align:center;font-size:clamp(9px,1.0vw,22px);color:var(--red);display:none;}
.tag{position:fixed;bottom:1vh;left:0;right:0;text-align:center;font-size:clamp(11px,1.05vw,23px);
  font-weight:600;color:rgba(255,255,255,.5);letter-spacing:.03vw;z-index:20;}

/* ══════════════════════════════════════════════════════════════════════════
   ANY SCREEN — phone, tablet, laptop, TV.
   The layout above is tuned for a shared screen across a room. A phone held in the
   hand is a different problem: less width, more height, and the reader is close.
   So below ~900px we stop scaling with the viewport and use real sizes.
   ══════════════════════════════════════════════════════════════════════════ */
@media (max-width: 900px){
  body{padding:10px 12px;overflow-y:auto;}

  /* Join */
  #join{height:auto;min-height:92vh;}
  #join h1{font-size:34px;}
  #join .sub{font-size:11px;letter-spacing:3px;margin-bottom:6px;}
  #join .purpose{font-size:14px;margin-bottom:16px;}
  .ctrllabel{font-size:12px;}
  .codebox{flex-direction:column;gap:14px;padding:18px 24px;border-radius:16px;}
  .code{font-size:52px;letter-spacing:6px;}
  #qr img{width:130px;height:130px;}
  #join .hint{font-size:13px;margin-top:24px;line-height:1.5;}
  .dot{width:8px;height:8px;margin-right:6px;}
  #connected{gap:12px;padding:14px 18px;border-radius:14px;margin-top:22px;}
  .tick{width:42px;height:42px;font-size:24px;}
  #connected .big{font-size:17px;}
  #connected .dev{font-size:12px;}
  #connected .go{font-size:10px;}

  /* Scores — a row of cards becomes a tight grid */
  #game{height:auto;min-height:92vh;}
  .scores{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:6px;margin-bottom:10px;}
  .pcard{padding:7px 6px;border-radius:10px;}
  .pname{font-size:13px;}
  .pnum{margin-right:3px;}
  .pscore{font-size:22px;}
  .pmeta{height:auto;gap:3px;}
  .pmeta .chip{font-size:9px;padding:1px 6px;}
  .pstat{font-size:9px;height:12px;letter-spacing:.5px;}

  /* Board */
  #board{gap:5px;}
  .cat{font-size:10px;padding:5px 3px;border-radius:7px;line-height:1.1;}
  .tile{font-size:18px;border-radius:7px;}
  .tile.blocked .star{font-size:14px;}
  .tile.blocked .sc{font-size:6px;}

  /* Question */
  .qhead{gap:14px;margin-bottom:14px;}
  #qcat{font-size:11px;letter-spacing:2px;}
  #qpts{font-size:30px;}
  #qwho{font-size:13px;min-height:16px;}
  #qtext{font-size:22px;line-height:1.35;max-width:100%;}
  #qans{margin-top:16px;}
  #qans .lbl{font-size:9px;}
  #qanstext{font-size:22px;}
  #qexp{font-size:12px;max-width:100%;margin-top:10px;}
  #timerRing{width:46px!important;height:46px!important;}
  #timerNum{width:46px;height:46px;font-size:17px;}
  #timerLbl{font-size:8px;}
  #result{font-size:17px;padding:10px 18px;border-radius:12px;margin-top:16px;}
  #result .sub{font-size:11px;}

  /* Generating */
  #gen .who{font-size:18px;}
  #gen .status{font-size:11px;margin-top:14px;}
  .spinner{width:36px;height:36px;border-width:3px;margin-bottom:16px;}

  /* Round end — the wide table can't fit; drop to the essentials */
  #roundEnd{padding:10px 4px;}
  .rv{font-size:16px;padding:10px 14px;margin-bottom:14px;border-radius:12px;}
  .rv .ans{font-size:12px;}
  #roundEnd .t{font-size:22px;}
  #roundEnd .s{font-size:13px;margin-bottom:14px;}
  .rtab{width:100%;}
  .rtab th{font-size:8px;padding:4px 3px;letter-spacing:.3px;}
  .rtab td{font-size:12px;padding:7px 3px;}
  .rtab td.nm{font-size:13px;}
  .rtab td.tot{font-size:17px;}

  .tag{font-size:8px;bottom:4px;}
  #audioLock{font-size:12px;padding:9px 18px;border-radius:20px;}
}

/* Very narrow (a phone in portrait): the steal/own-picks split won't fit. */
@media (max-width: 520px){
  .rtab .hide-narrow{display:none;}
  .pmeta .chip.hit{display:none;}     /* keep "yet to pick", drop the hit rate */
}

/* The TV is a noticeboard: one code, two ways in. Nobody types on it. */
.joiners{display:flex;gap:4vw;margin-top:4vh;align-items:center;justify-content:center;}
.jcard{display:flex;flex-direction:column;align-items:center;gap:1vh;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  border-radius:1.2vw;padding:2vh 2.5vw;}
.jrole{font-size:clamp(11px,1.1vw,22px);font-weight:800;letter-spacing:.2vw;
  text-transform:uppercase;color:var(--gold-hi);}
.jrole.player{color:var(--teal-hi);}
.qrbox{background:#fff;padding:.8vw;border-radius:.8vw;}
.qrbox img{display:block;width:clamp(90px,10vw,190px);height:clamp(90px,10vw,190px);}
.jhow{font-size:clamp(10px,1vw,19px);color:rgba(255,255,255,.5);text-align:center;line-height:1.4;}
.jhow .url{color:rgba(255,255,255,.35);font-size:.85em;}
/* Until the judge pairs, this room's code isn't final — the judge may bring its
   own room and we adopt that instead. Scanning now would hand out a dead code, so
   the player QR stays hidden until pairing. visibility (not display) keeps the
   code centred between the two cards. */
/* Only one QR is ever the right one to scan: the judge's before pairing, the
   players' after. Show that one, hide the other. */
#join:not(.connected) .playercard{display:none;}
#join.connected .judgecard{display:none;}

/* Both ways in are labelled in the same plain voice as the sentence above, so the
   subtitle reads straight into them: "...and: [scanning this QR] or [entering this code]". */
.ctrllabel{font-size:clamp(10px,1.35vw,29px);color:rgba(255,255,255,.62);margin-bottom:1vh;}
/* Scanning and typing are the same door — sit them side by side and say so. */
.orsep{font-size:clamp(9px,1.1vw,24px);letter-spacing:.2vw;text-transform:uppercase;
  color:rgba(255,255,255,.35);font-weight:700;}
#join .purpose b{color:var(--gold-hi);font-weight:800;}
/* The instruction belongs to the two controls below it, so it sits away from the
   headline and close to the things it's telling you to use. */
#join .purpose .howto{display:block;margin-top:3.5vh;font-size:clamp(10px,1.5vw,33px);color:rgba(255,255,255,.62);}
#join.connected .codebox{opacity:.45;transform:scale(.9);}

@media (max-width:900px){
  .joiners{gap:14px;margin-top:16px;}
  .jcard{padding:10px 12px;border-radius:12px;}
  .jrole{font-size:10px;}
  .qrbox img{width:88px;height:88px;}
  .jhow{font-size:10px;}
}
</style>
</head>
<body>

<div id="join">
  <h1>Trivia Night</h1>
  <div class="sub">Shared Screen</div>
  <div class="purpose" id="purposeLine"></div>

  <div class="joiners">
    <div class="jcard judgecard">
      <div class="ctrllabel">Scanning this QR</div>
      <div class="qrbox" id="qrJudge"></div>
    </div>

    <div class="jcard playercard">
      <div class="ctrllabel">Scanning this QR</div>
      <div class="qrbox" id="qrPlayer"></div>
    </div>

    <div class="orsep">or</div>

    <div class="codebox">
      <div>
        <div class="ctrllabel">Entering this code</div>
        <div class="code" id="code">····</div>
      </div>
    </div>
  </div>

  <div id="connected">
    <div class="tick">✓</div>
    <div class="txt">
      <div class="big">Shared screen added</div>
      <div class="go">Waiting for the judge to start the game</div>
    </div>
  </div>

  <div class="hint" id="hint"><span class="dot"></span>Waiting for the judge to connect</div>
</div>

</div>

<div id="game" style="position:relative;">
  <div class="topband">
    <div class="scores" id="scores"></div>
    <div id="gameJoin">
      <div class="qrbox" id="qrGameJoin"></div>
      <div class="gj-txt">Scan to join<br><b id="gjCode">····</b></div>
    </div>
  </div>
  <div id="roundEnd">
    <div id="roundVerdict" class="rv"></div>
    <div class="t"></div>
    <div class="s"></div>
    <div id="roundTable"></div>
  </div>
  <div id="board"></div>
  <div id="gen">
    <div class="spinner"></div>
    <div class="who" id="genWho"></div>
    <div class="status">Writing the question…</div>
  </div>
  <div id="qscreen">
    <div class="qhead">
      <div class="qhead-txt">
        <div id="qcat"></div>
        <div id="qpts"></div>
        <div id="qwho"></div>
      </div>
      <div id="timer">
        <div style="position:relative;">
          <svg id="timerRing" viewBox="0 0 72 72" style="width:5.5vw;height:5.5vw;">
            <circle id="timerTrack" cx="36" cy="36" r="30"/>
            <circle id="timerBar" cx="36" cy="36" r="30"/>
          </svg>
          <div id="timerNum">30</div>
        </div>
        <div id="timerLbl"></div>
      </div>
    </div>
    <div id="qtext"></div>
    <div id="qans">
      <span class="lbl">Answer</span>
      <div id="qanstext"></div>
      <div id="qexp"></div>
    </div>
    <div id="result"></div>
  </div>
</div>

<button id="audioLock">🔊  Press OK to let the TV read questions aloud</button>
<div class="offline" id="offline">Lost connection to the game — reload this page</div>
<div class="tag" id="tag"></div>

<script>
const TV_VERSION='5.8';
const TV_BUILT_AT='2026-07-18T17:43:17Z';
const BACKEND='';   // same origin

const PTS=[100,200,300,400,500];
let CODE=null, ES=null;

function fmt(iso){
  try{
    const d=new Date(iso); if(isNaN(d)) return '';
    const p={};
    new Intl.DateTimeFormat('en-CA',{year:'numeric',month:'2-digit',day:'2-digit',
      hour:'2-digit',minute:'2-digit',hour12:true}).formatToParts(d).forEach(x=>p[x.type]=x.value);
    const ap=(p.dayPeriod||'').replace(/\./g,'').toUpperCase();
    return `${p.year}-${p.month}-${p.day} ${p.hour}:${p.minute} ${ap}`;
  }catch(e){ return ''; }
}
function paintTags(){
  // This screen reports its OWN build only. The judge's and the server's builds
  // are visible on their own screens; crowding them in here just made this line
  // long and, before pairing, half unknown.
  document.getElementById('tag').textContent = `TV ${TV_VERSION} · ${fmt(TV_BUILT_AT)}`;
}
paintTags();

// ── The shared screen owns the room ──────────────────────────────────────────
// A TV remote is a miserable keyboard, so this page never asks for input. It
// creates the room, shows a code and a QR, and the JUDGE scans it. Player phones
// and tablets then join the same room from their own devices — they have real
// keyboards and cameras, so the effort belongs on them, not on the TV.
async function init(){
  try{
    const r = await fetch(BACKEND+'/api/room/new', {method:'POST'});
    const d = await r.json();
    CODE = d.code;
  }catch(e){
    document.getElementById('code').textContent='···';
    const o=document.getElementById('offline');
    o.style.display='block';
    o.textContent='Could not reach the server — reload this page';
    return;
  }
  useCode(CODE);
  purpose(ASK_JUDGE);
  listen();
}

// Show a code and point every QR at it. Called on load, and again if the judge
// hands us its own room (see the 'adopt' event below).
function useCode(code){
  CODE = code;
  document.getElementById('code').textContent = CODE;
  qr('qrJudge',  location.origin + '/?tv='   + CODE);   // judge scans → connects
  qr('qrPlayer', location.origin + '/join?code=' + CODE);   // players scan → watch
  qr('qrGameJoin', location.origin + '/join?code=' + CODE); // same link, lives on the game screen for latecomers
  const gj=document.getElementById('gjCode'); if(gj) gj.textContent = CODE;
}

function qr(id, url){
  const box=document.getElementById(id);
  if(!box) return;
  const img=document.createElement('img');
  img.alt='Scan to join';
  img.src='https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=0&data='+encodeURIComponent(url);
  img.onerror=()=>{ box.style.display='none'; };
  box.innerHTML='';
  box.appendChild(img);
}

// ── Paired / not paired ───────────────────────────────────────────────────
let _paired=false, _device='';
// This screen always talks to whoever has to act NEXT: the judge until they pair,
// then everyone else. Identity ("Shared Screen") never changes; the audience does.
function purpose(h){ const e=document.getElementById('purposeLine'); if(e) e.innerHTML=h; }
const ASK_JUDGE = 'The whole room follows the game here.<span class="howto">Add it on the judge\u2019s device under <b>Add Shared Screen</b>, by:</span>';
const ASK_PLAYERS = () => 'Follow along on your own personal screen at <b>'+location.host+'/join</b>, by:';

function setPaired(on, device){
  const dev = device || _device;
  if(on===_paired && dev===_device) return;
  _paired=on; _device=dev;
  // The whole join screen changes state — the code fades back, a big green
  // confirmation comes forward. Readable from the sofa, unlike a coloured dot.
  document.getElementById('join').classList.toggle('connected', on);
  const h=document.getElementById('hint');
  if(on){
    h.innerHTML='<span class="dot" style="background:#2ecc71;"></span>Judge connected';
    // The code has changed hands — it now belongs to the players, so say so.
    purpose(ASK_PLAYERS());
  } else {
    h.innerHTML='<span class="dot"></span>Waiting for the judge to connect';
    purpose(ASK_JUDGE);
  }
}

// ── Subscribe to the room's push stream ───────────────────────────────────
function listen(){
  ES = new EventSource(BACKEND+'/api/room/'+CODE+'/stream');
  ES.addEventListener('state',   e => render(JSON.parse(e.data)));
  ES.addEventListener('waiting', () => { setPaired(false, ''); });   // no phone yet
  ES.addEventListener('closed',  () => { location.reload(); });   // game over → fresh code
  // The judge already had a room with players in it. Move over to theirs rather
  // than stranding them on a room nobody is pushing to.
  ES.addEventListener('adopt', e => {
    let t=null; try{ t=JSON.parse(e.data).code; }catch(err){}
    if(!t || t===CODE) return;
    try{ ES.close(); }catch(err){}
    _roomGone=0; _lastHeard=0;
    useCode(t);
    listen();
  });
  ES.onerror = () => { document.getElementById('offline').style.display='block'; };
  ES.onopen  = () => { document.getElementById('offline').style.display='none'; };
}

// ── Render the snapshot ───────────────────────────────────────────────────
let _lastResultKey = null;      // so we only flash once per verdict

// ── End of round ──────────────────────────────────────────────────────────
// Mirrors the phone's callout: main vs steal, attempts, hit rate, points, total.
function renderRoundEnd(S){
  const re=document.getElementById('roundEnd');

  // The verdict for the question that just closed the round — without this, the
  // last player of a round never saw their "correct".
  const r=S.lastResult;
  const v=document.getElementById('roundVerdict');
  if(r){
    v.className = r.correct ? 'rv right' : 'rv wrong';
    v.innerHTML = r.correct
      ? `✓ ${r.player} got it${r.steal?' — STOLEN!':''} <span class="pts">+${r.pts}</span>`
      : `✗ Nobody got it`;
    if(S.revealedAnswer) v.innerHTML += `<div class="ans">Answer: <b>${S.revealedAnswer}</b></div>`;
    v.style.display='block';
  } else {
    v.style.display='none';
  }
  const rows=S.players.map((p,i)=>{
    const att=(S.attempts||[]).filter(a=>a.player===p);
    const main=att.filter(a=>a.type==='main');
    const stl =att.filter(a=>a.type==='steal');
    const tally=arr=>{
      const ok=arr.filter(a=>a.correct).length;
      const pts=arr.filter(a=>a.correct).reduce((s,a)=>s+(a.pts||0),0);
      return { n:arr.length, ok, pct: arr.length?Math.round(ok/arr.length*100):null, pts };
    };
    return { name:p, score:S.scores[i], main:tally(main), steal:tally(stl) };
  }).sort((a,b)=>b.score-a.score);

  const lead=rows[0];
  const tied=rows.filter(r=>r.score===lead.score).length>1;
  re.querySelector('.t').textContent = `End of Round ${S.roundEnded.round}`;
  re.querySelector('.s').innerHTML = lead.score>0
    ? (tied ? `Tied at <b>${lead.score}</b>` : `<b>${lead.name}</b> leads with <b>${lead.score}</b>`)
    : 'Still all square';

  const cell=(t)=> t.n
    ? `<td>${t.ok}/${t.n}</td><td>${t.pct}%</td><td>${t.pts}</td>`
    : `<td class="dim">—</td><td class="dim">—</td><td class="dim">—</td>`;

  let h='<table class="rtab"><thead>'
    + '<tr><th></th>'
    + '<th colspan="3" class="grp main sep">Own picks</th>'
    + '<th colspan="3" class="grp steal sep">Steals</th>'
    + '<th class="sep"></th></tr>'
    + '<tr><th style="text-align:left;">Player</th>'
    + '<th class="sep">Got</th><th>Rate</th><th>Pts</th>'
    + '<th class="sep">Got</th><th>Rate</th><th>Pts</th>'
    + '<th class="sep" style="text-align:right;">Total</th></tr></thead><tbody>';
  rows.forEach((r,idx)=>{
    h+=`<tr class="${idx===0&&r.score>0?'lead':''}">`
     + `<td class="nm">${idx===0&&r.score>0&&!tied?'👑 ':''}${r.name}</td>`
     + cell(r.main).replace('<td>','<td class="sep">').replace('<td class="dim">','<td class="dim sep">')
     + cell(r.steal).replace('<td>','<td class="sep">').replace('<td class="dim">','<td class="dim sep">')
     + `<td class="tot sep">${r.score}</td></tr>`;
  });
  h+='</tbody></table>';
  document.getElementById('roundTable').innerHTML=h;
}

// ── Countdown ─────────────────────────────────────────────────────────────
// The phone tells us ONCE that a timer started (id, total, seconds left). We run
// the tick locally so the ring animates smoothly, instead of the phone pushing
// 30 network updates per question.
// ── Speech ────────────────────────────────────────────────────────────────
// The phone asks; the TV speaks. Browsers refuse to make sound until the page has
// been interacted with — and nobody ever touches a TV — so we show a one-time
// "press OK" nudge to unlock audio for the session.
let _audioReady = false, _lastSpeakSeq = 0, _pendingSpeak = null;

function unlockAudio(){
  _audioReady = true;
  document.getElementById('audioLock').style.display='none';
  try{
    // A silent utterance is what actually unlocks the speech engine.
    const u=new SpeechSynthesisUtterance(' ');
    u.volume=0; window.speechSynthesis.speak(u);
  }catch(e){}
  if(_pendingSpeak){ const t=_pendingSpeak; _pendingSpeak=null; sayIt(t); }
}
document.getElementById('audioLock').addEventListener('click', unlockAudio);


// Any remote press works — a TV remote's OK usually lands as a keydown.
window.addEventListener('keydown', ()=>{ if(!_audioReady) unlockAudio(); });

function sayIt(text){
  if(!('speechSynthesis' in window)) return;
  try{
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.rate=0.9; u.pitch=1.05;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

function handleSpeak(sp){
  if(!sp || !sp.text) return;
  if(sp.seq === _lastSpeakSeq) return;         // already said this one
  _lastSpeakSeq = sp.seq;
  if(!('speechSynthesis' in window)) return;   // TV can't talk — phone will have to
  if(!_audioReady){
    _pendingSpeak = sp.text;
    document.getElementById('audioLock').style.display='block';
    return;
  }
  sayIt(sp.text);
}

const CIRC = 2 * Math.PI * 30;
let _timerId=null, _timerInt=null;

function stopTimer(){
  if(_timerInt){ clearInterval(_timerInt); _timerInt=null; }
  _timerId=null;
  document.getElementById('timer').style.display='none';
}

function runTimer(t){
  if(!t){ stopTimer(); return; }
  if(t.id === _timerId) return;          // already running this one
  if(_timerInt) clearInterval(_timerInt);
  _timerId = t.id;

  const wrap=document.getElementById('timer');
  const bar=document.getElementById('timerBar');
  const num=document.getElementById('timerNum');
  document.getElementById('timerLbl').textContent = t.label || '';
  bar.style.strokeDasharray = CIRC;
  wrap.style.display='flex';

  let remaining = t.remaining;
  const total = t.total || 30;

  const paint=()=>{
    num.textContent = remaining<0 ? 0 : remaining;
    const pct = Math.max(0, remaining/total);
    bar.style.strokeDashoffset = CIRC * (1-pct);
    const urgent = pct <= 0.33;
    bar.classList.toggle('urgent', urgent);
    num.classList.toggle('urgent', urgent);
  };
  paint();

  _timerInt=setInterval(()=>{
    remaining--;
    paint();
    if(remaining<=0){ clearInterval(_timerInt); _timerInt=null; }
  },1000);
}

// Plain next player in the rotation (for "On deck").
function nextInOrder(S, fromIdx){
  const o=S.turnOrder||[]; const n=o.length;
  const pos=o.indexOf(fromIdx);
  if(pos<0 || n<2) return -1;
  return o[(pos+1)%n];
}

// Mirrors the phone's findStealIdx(): the next player in turn order who hasn't
// already been wrong on this question.
function nextEligible(S, fromIdx){
  const order=S.turnOrder||[];
  const n=order.length;
  const pos=order.indexOf(fromIdx);
  for(let i=1;i<=n;i++){
    const idx=order[(pos+i)%n];
    if(S.judgeMode==='human' && idx===S.hjJudgeIdx) continue;
    if((S.wrongPlayers||[]).includes(idx)) continue;
    return idx;
  }
  return -1;
}

let _seq=0, _lastHeard=0;

// The phone heartbeats every 8s. If we stop hearing it (back button, closed tab,
// dead wifi), go back to the join screen instead of sitting on a frozen game.
// Two very different silences:
//   • the phone is in the FOREGROUND and stops beating  → it's gone. React fast.
//   • the phone is BACKGROUNDED                          → the browser throttled its
//     heartbeat to ~1/min. Be patient, it's still alive.
// Without this distinction we either dropped live phones or clung to dead ones.
const TIMEOUT_ACTIVE = 30000;    // was in the foreground → 30s of silence means gone
const TIMEOUT_HIDDEN = 180000;   // was backgrounded → tolerate heavy throttling
let _phoneVisible = true;

function dropPhone(){
  _lastHeard=0; _seq=0;
  setPaired(false, '');
  document.getElementById('join').style.display='flex';
  document.getElementById('game').style.display='none';
}

setInterval(()=>{
  if(!_lastHeard) return;
  const limit = _phoneVisible ? TIMEOUT_ACTIVE : TIMEOUT_HIDDEN;
  if(Date.now()-_lastHeard > limit) dropPhone();
}, 5000);

// Room heartbeat: the judge destroys the room when they leave, so the instant it's
// gone we go back to a fresh code. A brief 404 (server restart) self-heals — the
// judge re-creates its room on its next push — so we only bail after it's been gone
// past that recovery window (~12s).
let _roomGone=0;
setInterval(async()=>{
  if(!CODE) return;
  try{
    const r=await fetch(BACKEND+'/api/room/'+CODE);
    if(r.ok) _roomGone=0;
    else if(r.status===404 && ++_roomGone>=4) location.reload();
  }catch(e){ /* network blip — not a real close */ }
}, 3000);

// Escape hatch: any remote/keyboard press on the TV resets it back to a fresh code.
window.addEventListener('keydown', (e)=>{
  if(e.key==='r' || e.key==='R' || e.key==='Escape') location.reload();
});

function render(S){
  if(!S) return;

  // Out-of-order arrival: two rapid pushes can land backwards. Never let an older
  // state overwrite a newer one — that's what made the steal beats flicker/stick.
  if(S.seq!=null){
    if(S.seq < _seq) return;
    _seq = S.seq;
  }
  _lastHeard = Date.now();
  if(typeof S.visible==='boolean') _phoneVisible = S.visible;

  // A phone has pushed something — so we're paired, whatever it says.
  setPaired(true, S.device);

  // NO GAME RUNNING → go back to the join screen. Without this the TV kept
  // rendering the LAST game's board after the phone backed out to setup.
  if(!S.active || !S.players || !S.players.length){
    document.getElementById('join').style.display='flex';
    document.getElementById('game').style.display='none';
    _lastResultKey=null;
    return;
  }

  document.getElementById('join').style.display='none';
  document.getElementById('game').style.display='flex';

  handleSpeak(S.speak);

  const q = S.currentQuestion;
  const questionOpen = !!(q && q.text);
  const generating = !!S.generating;

  // ── Scores. Status is driven by PHASE, not by whether answererIdx happens to be
  //    set — it's set the moment a tile is tapped, which is why the TV was saying
  //    "Answering" while the judge was still reading the question aloud.
  const ph = S.phase;                     // pick | reading | answering | steal-offer | reveal
  const picker = S.nextPickerIdx;

  let statusOf = () => '';
  if(ph==='reading'){
    // Judge is reading it out. The picker is on the spot; the next player waits.
    const nxt = nextInOrder(S, S.answererIdx);
    statusOf = i => i===S.answererIdx ? ['Reading','active']
                  : i===nxt           ? ['On deck','ondeck'] : ['',''];
  } else if(ph==='answering'){
    const stealer = S.stealMode ? -1 : nextEligible(S, S.answererIdx);
    statusOf = i => i===S.answererIdx ? [S.stealMode?'Stealing':'Answering', S.stealMode?'steal':'active']
                  : i===stealer       ? ['Ready to steal!','steal'] : ['',''];
  } else if(ph==='steal-offer'){
    // Judge said "incorrect" — the steal is offered but not taken.
    statusOf = i => i===S.answererIdx      ? ['Missed','wrongcard']
                  : i===S.pendingStealIdx  ? ['Ready to steal!','steal'] : ['',''];
  } else if(ph==='reveal'){
    // Question is done and the turn has already advanced — say who's up.
    statusOf = i => i===picker ? ['Picks next','active'] : ['',''];
  } else {                                 // 'pick' — back on the board
    const nxt = nextInOrder(S, picker);
    statusOf = i => i===picker ? ['Picking','active']
                  : i===nxt    ? ['On deck','ondeck'] : ['',''];
  }

  const maxS=Math.max(...S.scores);
  const leader=(maxS>0 && S.scores.filter(x=>x===maxS).length===1) ? S.scores.indexOf(maxS) : -1;

  document.getElementById('scores').innerHTML = S.players.map((p,i)=>{
    const [stat, kind] = statusOf(i);
    let cls='pcard', statCls='pstat';
    if(kind==='active')    cls+=' active';
    if(kind==='steal'){    cls+=' steal';  statCls+=' ready'; }
    if(kind==='ondeck')    cls+=' ondeck';
    if(kind==='wrongcard'){cls+=' missed'; statCls+=' miss'; }

    const st=(S.streak||[])[i]||0;
    const badge = st>=2 ? ` 🔥${st}` : (st<=-2 ? ` 🧊${-st}` : '');
    const crown = (i===leader) ? '👑 ' : '';

    // Hit rate — omitted entirely until they've actually answered something,
    // otherwise every card opens with a meaningless "—".
    const mine=(S.attempts||[]).filter(a=>a.player===p);
    const ok=mine.filter(a=>a.correct).length;
    const hit = mine.length
      ? `<span class="chip hit">${Math.round(ok/mine.length*100)}% correct</span>`
      : '';

    // Whether they still owe a pick this round. Spelled out — "✓" and "to pick"
    // told nobody anything.
    const done=(S.pickedThisRound||[]).includes(i);
    const picked = done
      ? '<span class="chip">picked this round</span>'
      : '<span class="chip owed">yet to pick</span>';

    return `<div class="${cls}">
      <div class="pname"><span class="pnum">${i+1}</span>${crown}${p}${badge}</div>
      <div class="pscore">${S.scores[i]}</div>
      <div class="pmeta">${hit}${picked}</div>
      <div class="${statCls}">${stat}</div>
    </div>`;
  }).join('');

  // ── Round end / board / generating / question — exactly one at a time ──
  // The round panel belongs to the REVEAL beat: the phone shows the result and the
  // round callout together. Once the judge taps Next (phase='pick') we're back to
  // the board — otherwise the panel stuck on screen with no tiles behind it.
  const roundOver = !!S.roundEnded && ph==='reveal';
  document.getElementById('roundEnd').style.display = roundOver ? 'flex' : 'none';
  document.getElementById('board').style.display   = (!roundOver && !questionOpen && !generating) ? 'grid' : 'none';
  document.getElementById('gen').style.display     = (!roundOver && generating) ? 'flex' : 'none';
  document.getElementById('qscreen').style.display = (!roundOver && questionOpen) ? 'flex' : 'none';

  if(roundOver){
    renderRoundEnd(S);
    stopTimer();
    return;
  }

  if(generating){
    const g=S.generating;
    document.getElementById('genWho').innerHTML =
      `<b>${g.player||'Someone'}</b> picked <b>${g.category||'a category'}</b>` +
      (g.pts ? ` for <b>${g.pts}</b>` : '');
    stopTimer();
    return;
  }

  if(!questionOpen){
    const board=document.getElementById('board');
    board.style.gridTemplateColumns=`repeat(${S.numCats},1fr)`;
    board.style.gridTemplateRows=`auto repeat(${S.numQ},1fr)`;
    let h='';
    (S.categories||[]).forEach(c=>{ h+=`<div class="cat">${c}</div>`; });
    for(let qi=0; qi<S.numQ; qi++){
      for(let ci=0; ci<S.numCats; ci++){
        const key=`${ci}-${qi}`;
        if((S.blocked||{})[key])   h+=`<div class="tile blocked"><span class="star">★</span><span class="sc">All-Play<br>coming soon</span></div>`;
        else if((S.used||{})[key]) h+=`<div class="tile used"></div>`;
        else                       h+=`<div class="tile">${PTS[qi]}</div>`;
      }
    }
    board.innerHTML=h;
    _lastResultKey=null;                       // back on the board — arm the next flash
    document.getElementById('result').style.display='none';
    stopTimer();
    return;
  }

  // ── Question ──
  document.getElementById('qcat').textContent=(S.categories||[])[S.curCat]||'';
  document.getElementById('qpts').textContent=S.curPts||'';
  document.getElementById('qtext').textContent=q.text;

  // Who's on the spot — phase-driven. It used to always say "is answering", even
  // while the judge was still reading the question out loud.
  const who=S.players[S.answererIdx];
  let whoTxt='';
  if(who && !S.lastResult){
    if(ph==='reading')        whoTxt = `Get ready to answer, <b>${who}</b>`;
    else if(ph==='answering') whoTxt = S.stealMode ? `Steal it, <b>${who}</b>` : `Answer the question, <b>${who}</b>`;
  }
  document.getElementById('qwho').innerHTML = whoTxt;

  // The answer — and its explanation — only arrive after the judge reveals.
  const ansEl=document.getElementById('qans');
  const expEl=document.getElementById('qexp');
  if(S.revealedAnswer){
    document.getElementById('qanstext').textContent=S.revealedAnswer;
    if(S.revealedExplanation){
      expEl.textContent=S.revealedExplanation;
      expEl.style.display='block';
    } else {
      expEl.style.display='none';
    }
    ansEl.style.display='block';
  } else {
    ansEl.style.display='none';
    expEl.style.display='none';
  }

  runTimer(S.timer);

  // ── THE RESULT BEAT ──
  // Phase-driven, like the status. stealMode STAYS true after a failed steal, so
  // testing it directly made the TV keep saying "X is stealing" long after X had
  // already missed and the question was over.
  const res=document.getElementById('result');
  const r=S.lastResult;

  if(!r){
    res.style.display='none';
    _lastResultKey=null;
  } else {
    let cls, html;

    if(ph==='steal-offer' && S.pendingStealIdx!=null){
      // Someone missed and a steal is on the table — works for the 1st miss and
      // for a 2nd/3rd stealer alike.
      cls='wrong';
      html = `✗ ${r.player} missed`
           + `<span class="sub">${S.players[S.pendingStealIdx]} can steal it</span>`;

    } else if(ph==='answering' && S.stealMode){
      cls='stealing';
      html = `⚡ ${S.players[S.answererIdx]} is stealing`
           + `<span class="sub">half points up for grabs</span>`;

    } else if(ph==='reveal'){
      if(r.correct){
        cls='right';
        html = `✓ ${r.player} got it${r.steal?' — STOLEN!':''}`
             + `<span class="sub">+${r.pts} points</span>`;
      } else {
        // Everyone had a go and nobody got it.
        cls='wrong';
        html = `✗ Nobody got it`
             + `<span class="sub">No points this time</span>`;
      }

    } else {
      cls='wrong';
      html = `✗ ${r.player} missed`;
    }

    const key = `${ph}|${r.player}|${r.correct}|${r.pts}|${S.stealMode}|${S.pendingStealIdx}`;
    res.className = cls;
    res.innerHTML = html;
    res.style.display='block';

    if(key !== _lastResultKey){
      _lastResultKey = key;
      const body=document.body;
      body.classList.remove('flash-right','flash-wrong');
      void body.offsetWidth;                        // restart the animation
      body.classList.add(r.correct && ph==='reveal' ? 'flash-right' : 'flash-wrong');
      setTimeout(()=>body.classList.remove('flash-right','flash-wrong'), 800);
    }
  }

}

init();
</script>
</body>
</html>
