<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Trivia — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --night:#08090f; --panel:#12131c; --panel2:#1a1b26; --line:rgba(255,255,255,.1);
  --gold:#d4a843; --gold-hi:#e8c874; --teal-hi:#3dd5c8; --ink:#f0ece4; --muted:rgba(255,255,255,.45);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--night);color:var(--ink);font-family:'Outfit',sans-serif;min-height:100vh;padding:24px 16px 60px;}
.wrap{max-width:720px;margin:0 auto;}
h1{font-family:'Playfair Display',serif;font-weight:900;font-size:34px;color:var(--gold);line-height:1;}
.sub{color:var(--muted);font-size:13px;letter-spacing:1px;text-transform:uppercase;margin:6px 0 24px;}
.lbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.row{display:flex;gap:8px;align-items:stretch;margin-bottom:20px;}
select{flex:1;min-width:0;background:var(--panel2);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:10px 12px;font-family:'Outfit',sans-serif;font-size:14px;}
button.pill{flex:0 0 auto;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:rgba(255,255,255,.8);font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;padding:0 16px;cursor:pointer;}
button.pill:hover{background:rgba(255,255,255,.14);}
.section{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.3);margin:22px 0 8px;}
table{border-collapse:collapse;width:100%;font-size:13px;}
th,td{padding:8px 10px;text-align:right;border-bottom:1px solid rgba(255,255,255,.06);}
th{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
th:first-child,td:first-child{text-align:left;}
.hit-ok{color:var(--teal-hi);} .hit-good{color:var(--gold-hi);} .hit-low{color:#e05c6e;}
tr.total td{border-top:2px solid rgba(255,255,255,.2);font-weight:700;color:#fff;}
tr.totalrow td{border-top:2px solid rgba(255,255,255,.25);font-weight:700;}
tr.totalrow td:first-child{color:#fff;}
.muted{color:var(--muted);text-align:center;padding:24px 0;}
.details{margin-top:8px;border-top:1px solid var(--line);padding-top:14px;display:none;}
.details.show{display:block;}
.dl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35);margin:14px 0 6px;}
.prose{font-size:13px;color:rgba(255,255,255,.75);line-height:1.55;background:rgba(255,255,255,.04);border-radius:8px;padding:12px;}
.meta{font-size:12px;color:var(--muted);margin-bottom:4px;}
.note{font-size:13px;color:rgba(255,255,255,.6);font-style:italic;margin-bottom:6px;}
.footer{margin-top:40px;font-size:11px;color:rgba(255,255,255,.25);text-align:center;}
a{color:var(--muted);}
.warn{background:rgba(212,168,67,.12);border:1px solid rgba(212,168,67,.4);color:var(--gold-hi);border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:14px;}
.lowflag{font-size:9px;color:var(--muted);border:1px solid rgba(255,255,255,.2);border-radius:4px;padding:1px 4px;margin-left:6px;text-transform:uppercase;letter-spacing:.5px;}
table.grid th{text-align:center;}
table.grid th:first-child,table.grid td:first-child{text-align:left;}
table.grid td.cell{text-align:center;font-size:12px;font-weight:700;min-width:52px;}
table.grid td.cell .cn{display:block;font-size:9px;font-weight:400;color:var(--muted);margin-top:1px;}
table.grid .lowflag{margin-left:0;}
table.grid td.empty{text-align:center;color:rgba(255,255,255,.15);}
table.grid td.dim{text-align:center;color:rgba(255,255,255,.4);font-weight:400;}
</style>
<style>
.assistbox{border:1px solid rgba(212,168,67,.3);background:rgba(212,168,67,.05);border-radius:10px;padding:14px;margin-bottom:22px;}
.assistbtn{background:var(--gold);color:#14120e;border:none;border-radius:8px;padding:9px 18px;font-family:inherit;font-size:13px;font-weight:800;cursor:pointer;letter-spacing:.5px;}
.assistbtn:disabled{opacity:.55;cursor:default;}
.sqlbox{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:11px;overflow-x:auto;font-family:ui-monospace,Menlo,monospace;font-size:11px;line-height:1.5;white-space:pre;margin:8px 0;}
.tier3{width:100%;border-collapse:collapse;}
.tier3 th,.tier3 td{padding:7px 6px;text-align:center;font-size:12px;}
.tier3 thead th{font-size:9px;letter-spacing:1px;text-transform:uppercase;opacity:.55;border-bottom:1px solid rgba(255,255,255,.12);}
.tier3 thead th.mgrp{opacity:1;font-weight:800;}
.tier3 .mgrp{border-left:1px solid rgba(255,255,255,.12);}
.tier3 tbody td{border-bottom:1px solid rgba(255,255,255,.06);}
.tier3 .tcell{text-align:left;font-weight:700;}
.tier3 .tgt{opacity:.5;}
.tier3 .frac{opacity:.4;font-size:10px;}
.tier3 .none{opacity:.25;}
.tier3 .lown{font-size:9px;opacity:.5;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Family Trivia</h1>
  <div class="sub">Admin · Ruleset Calibration</div>
  <div id="buildFooter" style="margin:6px 0 18px;font-size:10px;line-height:1.6;opacity:.6;"></div>

  <div class="lbl">Difficulty Ruleset</div>
  <div class="row">
    <select id="rsSelect"></select>
    <button class="pill" id="detailsBtn">ⓘ Details</button>
  </div>

  <div id="statsArea"><div class="muted">Loading…</div></div>

  <div class="details" id="detailsPane"></div>

  <div class="footer">View-only. Data reads live from the game database.</div>
</div>

<script>
// Targets are DERIVED from the selected ruleset's tiers + the selected mode's nudge —
// never hardcoded, or admin would silently disagree with what the app actually asked for.
// These fallbacks must match DEFAULT_RULESET in index.html.
const FALLBACK_TIERS=[75,66,50,33,20];
const FALLBACK_EASY_NUDGE=15, FALLBACK_HARD_NUDGE=-15;
let TARGET_RATES={100:75,200:66,300:50,400:33,500:20};   // recomputed on every load
let MODE='normal';

function targetsForMode(mode){
  const r=RULESETS.find(x=>x.difficulty_ruleset_version===SELECTED)||{};
  const tiers=Array.isArray(r.tiers)&&r.tiers.length===5
    ? r.tiers.map(t=>Number(t.pct))
    : FALLBACK_TIERS;
  let nudge=0;
  if(mode==='easy') nudge=(r.easy_nudge==null?FALLBACK_EASY_NUDGE:Number(r.easy_nudge));
  else if(mode==='hard') nudge=(r.hard_nudge==null?FALLBACK_HARD_NUDGE:Number(r.hard_nudge));
  const pts=[100,200,300,400,500];
  const out={};
  tiers.forEach((pct,i)=>{
    out[pts[i]]=Math.max(15,Math.min(90,Math.round(pct+nudge)));   // same clamp as the app
  });
  return out;
}
function recomputeTargets(){ TARGET_RATES=targetsForMode(MODE); }
const LOW=25;    // fewer answers than this = statistically insufficient (flagged everywhere)
const NOISY=50;  // overall: fewer answers than this = whole ruleset is noisy
let RULESETS=[]; let SELECTED=null;

async function api(path){
  const r=await fetch(path);
  return await r.json();
}

function catExpected(ct){
  let w=0,n=0;
  Object.keys(ct||{}).forEach(t=>{ const a=ct[t].att; w+=(TARGET_RATES[t]||0)*a; n+=a; });
  return n>0?Math.round(w/n):0;
}

function tierTable(_ignored, tiersByMode){
  const tiers=[100,200,300,400,500];
  // Spectrum order: Easier <- Normal -> Harder (baseline centred)
  const modes=[
    {key:'easy',  label:'Easier', col:'var(--teal-hi, #3dd5c8)'},
    {key:'normal',label:'Normal', col:'var(--gold-hi, #f0c855)'},
    {key:'hard',  label:'Harder', col:'#a78bfa'},
  ];
  const T={}; modes.forEach(m=>{ T[m.key]=targetsForMode(m.key); });

  let h='<table class="tier3"><thead>';
  h+='<tr><th></th>';
  modes.forEach(m=>{ h+=`<th colspan="2" class="mgrp" style="color:${m.col};">${m.label}</th>`; });
  h+='</tr><tr><th>Tier</th>';
  modes.forEach(()=>{ h+='<th class="mgrp">Actual</th><th>Target</th>'; });
  h+='</tr></thead><tbody>';

  tiers.forEach(t=>{
    h+=`<tr><td class="tcell">${t}</td>`;
    modes.forEach(m=>{
      const d=((tiersByMode||{})[m.key]||{})[t];
      const att=(d&&d.att)||0, ok=(d&&d.ok)||0;
      const tgt=T[m.key][t];
      if(att===0){
        h+=`<td class="mgrp none">—</td><td class="tgt">${tgt}%</td>`;
      } else {
        const pct=Math.round(ok/att*100);
        const diff=pct-tgt;
        const low=att<LOW;
        const cls=low?'':(Math.abs(diff)<=10?'hit-ok':(diff>0?'hit-good':'hit-low'));
        const lowTag=low?` <span class="lown">low n</span>`:'';
        h+=`<td class="mgrp ${cls}" title="${ok}/${att} · target ${tgt}%">`+
           `<b>${pct}%</b> <span class="frac">(${ok}/${att})</span>${lowTag}</td>`+
           `<td class="tgt">${tgt}%</td>`;
      }
    });
    h+='</tr>';
  });
  h+='</tbody></table>';
  h+='<div class="meta" style="margin-top:6px;">Each mode is compared against <b>its own</b> target (Normal targets shifted by the ruleset\'s nudge). Actual shows hit rate with (correct/attempts). "low n" = under '+LOW+' answers — ignore it. "—" = no games played in that mode yet.</div>';
  return h;
}

function cellHTML(obj, target){
  if(!obj||obj.att===0) return '<td class="empty">·</td>';
  const pct=Math.round(obj.ok/obj.att*100), diff=pct-target;
  const cls='cell '+(Math.abs(diff)<=10?'hit-ok':diff>0?'hit-good':'hit-low');
  const sub=obj.att<LOW?`<span class="lowflag">low n (${obj.att})</span>`:`n=${obj.att}`;
  return `<td class="${cls}" title="${obj.ok}/${obj.att} · target ${target}%">${pct}%<div class="cn">${sub}</div></td>`;
}
function overallCell(obj, exp){
  if(!obj||obj.att===0) return '<td class="empty">·</td>';
  const pct=Math.round(obj.ok/obj.att*100), diff=pct-exp;
  const cls='cell '+(Math.abs(diff)<=10?'hit-ok':diff>0?'hit-good':'hit-low');
  const tail=obj.att<LOW?`<span class="lowflag">low n (${obj.att})</span>`:`n=${obj.att}`;
  return `<td class="${cls}" title="${obj.ok}/${obj.att} · expected ${exp}%">${pct}%<div class="cn">${tail}</div></td>`;
}
function expectedCell(obj, exp){
  if(!obj||obj.att===0) return '<td class="empty">·</td>';
  return `<td class="cell" style="color:var(--muted);font-weight:400;">${exp}%</td>`;
}
function matrixTable(s){
  const tiers=[100,200,300,400,500];
  const byCatTier=s.byCatTier||{}, byCat=s.byCat||{}, byTier=s.byTier||{};
  // Rows come from every mode's categories — so switching to a mode with no data
  // still shows the full grid (empty cells), never a blank page that traps you.
  const cats=(s.categoriesAll&&s.categoriesAll.length)
    ? s.categoriesAll.slice().sort()
    : Object.keys(byCatTier).sort();
  if(!cats.length) return '<div class="muted">No data.</div>';
  const empty=(s.total||0)===0
    ? '<div class="muted" style="font-size:11px;margin-bottom:8px;">No games played in this mode yet — the grid below is empty.</div>'
    : '';
  let h=empty+'<div style="overflow-x:auto;"><table class="grid"><tr><th>Category</th>';
  tiers.forEach(t=>h+=`<th>${t}</th>`);
  h+='<th>Overall</th><th>Expected</th></tr>';
  cats.forEach(cat=>{
    h+=`<tr><td>${cat}</td>`;
    tiers.forEach(t=>{ h+=cellHTML((byCatTier[cat]||{})[t], TARGET_RATES[t]); });
    const exp=catExpected(byCatTier[cat]);
    h+=overallCell(byCat[cat], exp);
    h+=expectedCell(byCat[cat], exp);
    h+='</tr>';
  });
  // Totals row: per-tier column totals + grand total
  h+='<tr class="totalrow"><td>Total</td>';
  let gW=0,gN=0;
  tiers.forEach(t=>{
    h+=cellHTML(byTier[t], TARGET_RATES[t]);
    const a=(byTier[t]&&byTier[t].att)||0; gW+=TARGET_RATES[t]*a; gN+=a;
  });
  const gExp=gN>0?Math.round(gW/gN):0;
  // Grand Overall/Expected blend floats with what players picked, so it's not a
  // reliable calibration signal — leave those two corner cells blank.
  h+='<td class="empty"></td><td class="empty"></td>';
  h+='</tr></table></div>';
  h+='<div class="meta" style="margin-top:6px;">Rows = categories, columns = point tiers. Tier cells compare actual vs that tier’s target; Overall compares actual vs the Expected column (targets blended by how often each tier was asked). “low n (#)” = fewer than '+LOW+' answers, with the count shown.</div>';
  return h;
}

let LAST_STATS=null;   // stashed by loadStats so the assistant can analyse what you're seeing

// Compact, factual payload. Every cell keeps its sample size so the model can judge
// what it's allowed to conclude — and can tell us where we simply don't have data yet.
function buildAnalysisPayload(){
  const s=LAST_STATS;
  if(!s) return null;
  const r=RULESETS.find(x=>x.difficulty_ruleset_version===SELECTED)||{};
  const tiers=[100,200,300,400,500];
  const modes=['easy','normal','hard'];
  const MODE_LABEL={easy:'Easier',normal:'Normal',hard:'Harder'};

  const byMode={};
  modes.forEach(m=>{
    const T=targetsForMode(m);
    byMode[MODE_LABEL[m]]=tiers.map(t=>{
      const d=((s.tiersByMode||{})[m]||{})[t]||{att:0,ok:0};
      return {
        tier:t, target_pct:T[t], attempts:d.att, correct:d.ok,
        actual_pct: d.att>0?Math.round(d.ok/d.att*100):null,
        gap: d.att>0?Math.round(d.ok/d.att*100)-T[t]:null
      };
    });
  });

  // Category x tier for the mode currently on screen
  const catRows=[];
  (s.categoriesAll||[]).forEach(cat=>{
    const row={category:cat, tiers:{}};
    tiers.forEach(t=>{
      const d=((s.byCatTier||{})[cat]||{})[t];
      row.tiers[t]= d&&d.att ? {attempts:d.att, actual_pct:Math.round(d.ok/d.att*100), target_pct:TARGET_RATES[t]} : null;
    });
    catRows.push(row);
  });

  return {
    ruleset_version:SELECTED,
    ruleset_note:r.note||null,
    current_tier_targets_normal:(Array.isArray(r.tiers)?r.tiers.map(t=>({name:t.name,pct:t.pct})):null),
    current_easy_nudge:(r.easy_nudge==null?FALLBACK_EASY_NUDGE:r.easy_nudge),
    current_hard_nudge:(r.hard_nudge==null?FALLBACK_HARD_NUDGE:r.hard_nudge),
    min_sample_size:LOW,
    by_mode:byMode,
    category_matrix:{mode:MODE_LABEL[MODE], rows:catRows},
    total_answers:s.totalAll||0
  };
}

function analysisPrompt(payload){
  return `You are a game-difficulty calibration analyst for a family trivia app.

The app asks questions at 5 point tiers (100-500). Each tier has a TARGET hit rate - the share of questions a typical player should get right. Three difficulty modes exist: Normal (the baseline) plus Easier and Harder, which shift every target by a nudge. Each mode is judged against ITS OWN targets.

Here is the data:

${JSON.stringify(payload,null,2)}

RULES YOU MUST FOLLOW:
1. A cell with fewer than ${payload.min_sample_size} attempts is NOT evidence. Never draw a conclusion from it. Do not describe it as a trend, a problem, or a success.
2. Where data is missing or too thin to judge, SAY SO EXPLICITLY and tell us what to play to fill the gap. This is one of your most useful outputs - do not skip it.
3. A gap within +/-10 points of target is fine. Do not recommend changes for it.
4. Never invent a finding to seem useful. "The data does not support a conclusion here" is a valid and valuable answer.
5. Be concrete: name the tier, the mode, the actual vs target, and the sample size behind every claim.

Respond in this exact structure, using plain headings:

## What the data says
Only findings backed by at least ${payload.min_sample_size} attempts. For each: the numbers, and whether it is a real signal.

## Where we lack data
Which modes/tiers/categories have too little data to judge, and what to play to fix that.

## Recommendation
Should the ruleset change? If yes, exactly which targets or nudges, and why. If no, say so plainly.

## SQL
If (and only if) you recommend a change, give the SQL for a NEW ruleset version (never edit an existing one - versions are frozen once they have attempts). Copy every field from the current ruleset, changing only what you recommend. Increment difficulty_ruleset_version. If no change is warranted, write "No change recommended."

Be concise. No preamble.`;
}

async function runAssistant(){
  const out=document.getElementById('assistOut');
  const btn=document.getElementById('assistBtn');
  const payload=buildAnalysisPayload();
  if(!payload){ out.innerHTML='<div class="muted">Load stats first.</div>'; return; }
  btn.disabled=true; btn.textContent='Analysing…';
  out.innerHTML='<div class="muted">Reading the numbers…</div>';
  try{
    const r=await fetch('/api/claude',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2000,
        messages:[{role:'user',content:analysisPrompt(payload)}]})
    });
    if(!r.ok) throw new Error('proxy '+r.status);
    const d=await r.json();
    const txt=(d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
    out.innerHTML=mdToHTML(txt||'(empty response)');
  }catch(e){
    out.innerHTML='<div class="muted">Analysis failed — '+(e.message||'try again')+'.</div>';
  }
  btn.disabled=false; btn.textContent='Analyse';
}

// Minimal markdown: headings, bold, code blocks, bullets
function mdToHTML(t){
  const esc=x=>x.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const blocks=t.split(/```(?:sql)?/);
  let h='';
  blocks.forEach((b,i)=>{
    if(i%2===1){ h+=`<pre class="sqlbox">${esc(b.trim())}</pre>`; return; }
    b.split('\n').forEach(line=>{
      const l=line.trim();
      if(!l){ h+=''; return; }
      if(l.startsWith('## ')) h+=`<div class="section" style="margin-top:16px;">${esc(l.slice(3))}</div>`;
      else if(l.startsWith('# ')) h+=`<div class="section" style="margin-top:16px;">${esc(l.slice(2))}</div>`;
      else if(/^[-*]\s/.test(l)) h+=`<div style="margin:3px 0 3px 14px;">• ${esc(l.slice(2)).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')}</div>`;
      else h+=`<div style="margin:6px 0;line-height:1.55;">${esc(l).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')}</div>`;
    });
  });
  return h;
}

function modeSelectorHTML(){
  const opts=[['easy','Easier'],['normal','Normal (baseline)'],['hard','Harder']]
    .map(([v,l])=>`<option value="${v}"${v===MODE?' selected':''}>${l}</option>`).join('');
  return `<div class="row" style="margin-bottom:12px;"><select id="modeSelect" style="min-width:0;">${opts}</select></div>`;
}
function wireModeSelector(){
  const m=document.getElementById('modeSelect');
  if(m) m.addEventListener('change',()=>{ MODE=m.value; loadStats(); });
}

function trendChart(trendByMode){
  const modes=[
    {key:'easy',  label:'Easier', col:'var(--teal-hi)'},
    {key:'normal',label:'Normal', col:'var(--gold-hi)'},
    {key:'hard',  label:'Harder', col:'#a78bfa'},
  ];
  // A bucket's EXPECTED rate = its tiers' targets, weighted by how often each was asked.
  // We plot actual - expected, so 0 means "on target" for every mode alike.
  function gaps(mode){
    const T=targetsForMode(mode);
    return (trendByMode[mode]||[]).map(b=>{
      let w=0,n=0;
      Object.keys(b.byTier||{}).forEach(t=>{ const a=b.byTier[t].att; w+=(T[t]||0)*a; n+=a; });
      const expected=n>0?w/n:0;
      return {gap:Math.round(b.pct-expected), n:b.n};
    });
  }
  const series=modes.map(m=>({...m, pts:gaps(m.key)})).filter(s=>s.pts.length>=2);
  if(!series.length) return '<div class="muted">Not enough data yet for a trend.</div>';

  const maxN=Math.max(...series.map(s=>s.pts.length));
  const W=680,H=150,pad=30;
  const x=i=>pad+(W-2*pad)*(maxN===1?0:i/(maxN-1));
  const LIM=40;                                   // clamp the axis to +/-40 points of gap
  const y=g=>H/2-((H-2*pad)/2)*(Math.max(-LIM,Math.min(LIM,g))/LIM);

  let grid='';
  [30,15,0,-15,-30].forEach(g=>{
    const zero=g===0;
    grid+=`<line x1="${pad}" y1="${y(g).toFixed(1)}" x2="${W-pad}" y2="${y(g).toFixed(1)}" stroke="rgba(255,255,255,${zero?'.35':'.07'})" stroke-width="${zero?1.5:1}"/>`;
    grid+=`<text x="2" y="${(y(g)+3).toFixed(1)}" fill="rgba(255,255,255,${zero?'.5':'.28'})" font-size="9">${g>0?'+':''}${g}</text>`;
  });

  let paths='',dots='',legend='';
  series.forEach(s=>{
    const pts=s.pts.map((p,i)=>`${x(i).toFixed(1)},${y(p.gap).toFixed(1)}`).join(' ');
    paths+=`<polyline points="${pts}" fill="none" stroke="${s.col}" stroke-width="2"/>`;
    dots+=s.pts.map((p,i)=>{
      const thin=p.n<LOW;                          // don't imply confidence in a thin bucket
      return `<circle cx="${x(i).toFixed(1)}" cy="${y(p.gap).toFixed(1)}" r="${thin?2:3.2}" fill="${thin?'transparent':s.col}" stroke="${s.col}" stroke-width="1.2"><title>${s.label}: ${p.gap>0?'+':''}${p.gap} pts vs target · n=${p.n}${thin?' (low n)':''}</title></circle>`;
    }).join('');
    legend+=`<span style="display:inline-flex;align-items:center;gap:5px;margin-right:14px;"><span style="width:14px;height:2px;background:${s.col};display:inline-block;"></span><span style="color:${s.col};font-weight:700;">${s.label}</span></span>`;
  });

  return `<div style="font-size:11px;margin-bottom:6px;">${legend}</div>`+
    `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;">${grid}${paths}${dots}</svg>`+
    `<div class="meta">Gap from target over time (oldest → newest). <b>0 = on target.</b> Above the line = running easier than intended; below = harder. Each mode is measured against its own targets, so all three are comparable. Hollow dots are thin buckets (under ${LOW} answers) — don't read them.</div>`;
}

async function loadStats(){
  const area=document.getElementById('statsArea');
  area.innerHTML='<div class="muted">Loading…</div>';
  if(SELECTED==null){ area.innerHTML='<div class="muted">No ruleset selected.</div>'; return; }
  let s;
  recomputeTargets();
  try{ s=await api('/api/stats/tiers?ruleset='+encodeURIComponent(SELECTED)+'&mode='+encodeURIComponent(MODE)); }
  catch(e){ area.innerHTML='<div class="muted">Couldn’t reach the server. Reload in a moment.</div>'; return; }
  LAST_STATS=s;
  if(!s || (s.totalAll||0)===0){ area.innerHTML='<div class="muted">No answers recorded under this ruleset yet.</div>'; return; }
  const modeStr=Object.keys(s.byMode||{}).map(m=>m+': '+s.byMode[m]).join('  ·  ')||'—';
  const stealStr=(s.steals&&s.steals.att>0)?(s.steals.ok+'/'+s.steals.att):'0';
  const noisy = s.total<NOISY ? `<div class="warn">⚠ Only ${s.total} answers under this ruleset — numbers are noisy. Accumulate more before tuning.</div>` : '';
  // Calibration measures the Normal baseline; Easier/Harder games are measured separately.
  const MODE_LABEL={normal:'Normal',easy:'Easier',hard:'Harder'};
  const modeNote = '';
  area.innerHTML=
    noisy+
    modeNote+
    `<div class="meta">${s.total} answers · steals ${stealStr} · by mode ${modeStr}</div>`+
    '<div class="assistbox">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">'+
        '<div><div class="section" style="margin:0;">Calibration Assistant</div>'+
        '<div class="muted" style="font-size:11px;margin-top:2px;">Reads the numbers below and says what (if anything) to change — and where we still lack data.</div></div>'+
        '<button id="assistBtn" class="assistbtn">Analyse</button>'+
      '</div>'+
      '<div id="assistOut" style="margin-top:12px;"></div>'+
    '</div>'+
    '<div class="section">By Tier · All Modes</div>'+tierTable(s.byTier||{}, s.tiersByMode||{})+
    '<div class="section">Drift From Target · All Modes</div>'+trendChart(s.trendByMode||{})+
    '<hr style="border:none;border-top:1px solid rgba(255,255,255,.12);margin:26px 0 18px;">'+
    '<div class="section">Category × Tier</div>'+
    '<div class="muted" style="font-size:11px;margin-bottom:10px;">This section only \u2014 pick a mode:</div>'+
    modeSelectorHTML()+
    matrixTable(s);
  wireModeSelector();
  const ab=document.getElementById('assistBtn');
  if(ab) ab.addEventListener('click',runAssistant);
}

function renderDetails(){
  const pane=document.getElementById('detailsPane');
  const r=RULESETS.find(x=>x.difficulty_ruleset_version===SELECTED);
  if(!r){ pane.innerHTML=''; return; }
  const prose=t=>`<div class="prose">${t?t:'<span style="color:rgba(255,255,255,.3);">(none)</span>'}</div>`;
  const created=r.created_at?new Date(r.created_at).toLocaleString():'';
  let h=`<div class="meta">Ruleset ${r.difficulty_ruleset_version} · Model: ${r.model||'—'}${created?' · '+created:''}</div>`;
  if(r.note) h+=`<div class="note">${r.note}</div>`;
  h+='<div class="dl">Tier Targets</div>';
  if(Array.isArray(r.tiers)&&r.tiers.length){
    h+='<table><tr><th>Tier</th><th>Target</th><th style="text-align:left;">Style anchor</th></tr>';
    r.tiers.forEach(t=>{ h+=`<tr><td>${t.name}</td><td>${t.pct}%</td><td style="text-align:left;font-size:12px;">${t.anchor||''}</td></tr>`; });
    h+='</table>';
  } else h+=prose(null);
  h+='<div class="dl">Reference Player</div>'+prose(r.reference_player);
  h+='<div class="dl">Audience Note</div>'+prose(r.audience_note);
  h+='<div class="dl">AI Judge Leniency</div>'+prose(r.judge_prompt);
  h+='<div class="dl">Category Overrides</div>';
  const ov=r.category_overrides;
  if(ov && typeof ov==='object' && Object.keys(ov).length){
    Object.keys(ov).forEach(k=>{ h+=`<div style="font-size:12px;font-weight:700;color:var(--gold-hi);margin:10px 0 4px;">${k}</div>`+prose(ov[k]); });
  } else h+=prose(null);
  h+='<div class="dl">Easy Nudge</div>'+prose(r.easy_nudge);
  h+='<div class="dl">Hard Nudge</div>'+prose(r.hard_nudge);
  pane.innerHTML=h;
}

document.getElementById('rsSelect').addEventListener('change',e=>{
  SELECTED=Number(e.target.value);
  loadStats();
  if(document.getElementById('detailsPane').classList.contains('show')) renderDetails();
});
document.getElementById('detailsBtn').addEventListener('click',()=>{
  const pane=document.getElementById('detailsPane');
  const open=pane.classList.toggle('show');
  if(open) renderDetails();
});

// ── Build stamp ───────────────────────────────────────────────────────────────
// This page self-reports its own build. The SERVER's build is fetched live.
const ADMIN_VERSION='3.9';
const ADMIN_BUILT_AT='2026-07-13T14:26:17Z';   // UTC; shown in the device's local time

function fmtBuildTime(iso){
  try{
    const d=new Date(iso);
    if(isNaN(d)) return '\u2014';
    // Localized to the device's timezone, formatted YYYY-MM-DD hh:mm AM/PM
    const p={};
    new Intl.DateTimeFormat('en-CA',{year:'numeric',month:'2-digit',day:'2-digit',
      hour:'2-digit',minute:'2-digit',hour12:true})
      .formatToParts(d).forEach(x=>{p[x.type]=x.value;});
    const ap=(p.dayPeriod||'').replace(/\./g,'').toUpperCase();
    return `${p.year}-${p.month}-${p.day} ${p.hour}:${p.minute} ${ap}`;
  }catch(e){ return '\u2014'; }
}
async function renderBuildFooter(){
  const el=document.getElementById('buildFooter');
  if(!el) return;
  const adminLine=`Admin ${ADMIN_VERSION} · ${fmtBuildTime(ADMIN_BUILT_AT)}`;
  el.innerHTML=`${adminLine}<br>Server …`;
  let srv='Server — unreachable';
  try{
    const d=await api('/api/version');
    srv=`Server ${d.version} · ${fmtBuildTime(d.builtAt)}`;
  }catch(e){}
  el.innerHTML=`${adminLine}<br>${srv}`;
}

(async function init(){
  renderBuildFooter();
  try{
    RULESETS=await api('/api/rulesets');
  }catch(e){ document.getElementById('statsArea').innerHTML='<div class="muted">Couldn’t reach the server. Reload in a moment.</div>'; return; }
  if(!Array.isArray(RULESETS)||RULESETS.length===0){
    document.getElementById('statsArea').innerHTML='<div class="muted">No rulesets defined yet.</div>'; return;
  }
  const sel=document.getElementById('rsSelect');
  sel.innerHTML=RULESETS.map(r=>`<option value="${r.difficulty_ruleset_version}">Ruleset ${r.difficulty_ruleset_version}${r.note?' — '+r.note:''}</option>`).join('');
  SELECTED=RULESETS[RULESETS.length-1].difficulty_ruleset_version; // newest
  sel.value=SELECTED;
  loadStats();
})();
</script>
